<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Beepo's Kitchen</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html,body { height:100%; overflow:hidden; font-family:ui-rounded,'SF Pro Rounded','Arial Rounded MT Bold','Baloo 2',system-ui,sans-serif; }
  body {
    background: linear-gradient(#FFE9A8 0%, #FFD97A 55%, #FFC85C 100%);
    display:flex; flex-direction:column;
    touch-action:manipulation;
  }
  svg.icon { display:block; overflow:visible; }

  /* ---------- top bar ---------- */
  #topbar { display:flex; justify-content:flex-end; align-items:center; padding:10px 14px 0; }
  #muteBtn, #musicBtn { font-size:22px; background:#fff8; border:none; border-radius:14px; width:40px; height:40px; box-shadow:0 3px 0 #d9a94e; opacity:.85; }
  #muteBtn:active, #musicBtn:active { transform:translateY(2px); box-shadow:0 1px 0 #d9a94e; }

  /* ---------- stage ---------- */
  #stage { position:relative; height:32%; min-height:200px; display:flex; align-items:flex-end; justify-content:center; }
  #floor { position:absolute; bottom:0; left:0; right:0; height:34px;
    background: repeating-conic-gradient(#F7B34A 0% 25%, #FFDE9C 0% 50%) 0 0/34px 34px; opacity:.45; }

  /* Beepo */
  #beepo { position:absolute; left:2%; bottom:56px; width:112px; z-index:5; }
  #beepo.hop { animation:hop .7s ease; }
  @keyframes hop { 30%{transform:translateY(-16px) rotate(-4deg);} 60%{transform:translateY(0);} 80%{transform:translateY(-6px);} }
  .beye { transform-box:fill-box; transform-origin:center; animation:blink 4.6s infinite; }
  @keyframes blink { 0%,94%,100%{transform:scaleY(1);} 97%{transform:scaleY(.08);} }
  .antBall { transform-box:fill-box; transform-origin:center; animation:bob 2.2s ease-in-out infinite; }
  @keyframes bob { 50%{transform:translateY(-4px);} }
  #bubbleTalk { position:absolute; top:-14px; left:82px; background:#fff; border-radius:16px; padding:8px 13px;
    font-weight:800; font-size:16px; color:#8A4B12; opacity:0; transform:scale(.5); transition:all .35s; white-space:nowrap;
    box-shadow:0 3px 0 #d9a94e77; z-index:9;}
  #bubbleTalk.show { opacity:1; transform:scale(1); }
  #bubbleTalk::after { content:''; position:absolute; bottom:-7px; left:14px; border:8px solid transparent; border-top-color:#fff; border-bottom:0; }

  /* stove + pot */
  #stoveWrap { position:relative; bottom:12px; width:204px; z-index:4; }
  /* stove demoted to quiet counter-wood: the POT is the hero of the stage */
  #stove { width:204px; height:48px; background:linear-gradient(#DCA55F,#C68544); border-radius:14px 14px 8px 8px;
    box-shadow:0 5px 0 #9C6B35; position:relative; }
  #stove::before { content:''; position:absolute; top:8px; left:16px; width:19px; height:19px; border-radius:50%;
    background:#B98A4E; box-shadow:0 0 0 4px #A9743B inset, 150px 0 0 0 #B98A4E; }
  #potWrap { position:absolute; bottom:38px; left:50%; transform:translateX(-50%); width:204px; height:136px; }
  #potWrap > svg { animation:potBreathe 3.2s ease-in-out infinite; transform-origin:50% 90%; }
  /* stir-ready: the pot glows like a button until the third stir */
  #potWrap.ready > svg { animation:potBreathe 3.2s ease-in-out infinite, potGlow 1.5s ease-in-out infinite; }
  @keyframes potGlow { 50%{ filter:drop-shadow(0 0 16px #FFD94A) drop-shadow(0 0 4px #FFD94A); } }
  @keyframes potBreathe { 50%{ transform:scale(1.02) translateY(-1px);} }
  #potWrap.stirring { animation:rock .8s ease; }
  @keyframes rock { 25%{transform:translateX(-50%) rotate(-4deg);} 75%{transform:translateX(-50%) rotate(4deg);} }
  #potWrap.wobble { animation:wob .5s ease; }
  @keyframes wob { 25%{transform:translateX(-54%);} 50%{transform:translateX(-46%);} 75%{transform:translateX(-52%);} }
  #soupEllipse { fill:#F2B04A; transition: fill 1s; }
  #soupItems { position:absolute; left:25px; top:10px; width:155px; height:53px; }
  #soupItems.swirl .floatItem { animation:spin1 1s ease; }
  @keyframes spin1 { 50%{ transform:translateX(26px) rotate(180deg) scale(.85);} 100%{transform:rotate(360deg);} }
  .floatItem { position:absolute; animation:floaty 3s ease-in-out infinite; cursor:pointer; }
  .floatItem:active { transform:scale(1.15); }
  @keyframes floaty { 50%{ transform:translateY(-4px) rotate(10deg);} }
  .bubble { position:absolute; bottom:8px; width:9px; height:9px; background:#ffffff77; border-radius:50%;
    animation:rise 2.6s linear infinite; }
  @keyframes rise { 0%{transform:translateY(0) scale(.5); opacity:0;} 30%{opacity:1;} 100%{transform:translateY(-26px) scale(1.2); opacity:0;} }
  .steam { position:absolute; top:-32px; width:30px; height:19px; background:#fff; border-radius:50%;
    box-shadow:-10px 6px 0 -5px #fff, 10px 6px 0 -5px #fff;
    animation:steamUp 3.4s ease-in-out infinite; }
  @keyframes steamUp { 0%{transform:translateY(10px) scale(.7); opacity:0;} 40%{opacity:.65;} 100%{transform:translateY(-28px) scale(1.25); opacity:0;} }

  /* stir button */
  @keyframes pulse { 50%{ transform:scale(1.07);} }


  /* ---------- shelf ---------- */
  #shelfWrap { flex:1; background:linear-gradient(#D89A5F,#C9884E); border-top:8px solid #B06F35;
    border-radius:26px 26px 0 0; padding:10px 10px 14px; overflow-y:auto; box-shadow:0 -6px 14px #0002; }
  #shelf { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:480px; margin:0 auto; }
  .ing { background:linear-gradient(#FFF8E8,#FFEECB); border:none; border-radius:18px; padding:10px 4px;
    box-shadow:0 4px 0 #A9743B; font-family:inherit; transition:opacity .3s;
    display:flex; align-items:center; justify-content:center; }
  .ing svg { width:80px; height:80px; }
  .ing:active { transform:translateY(3px) scale(.96); box-shadow:0 1px 0 #A9743B; }
  @media (max-height:730px) {
    #stage { min-height:182px; }
    .ing svg { width:62px; height:62px; }
    #shelf { gap:8px; }
  }

  .flyer { position:fixed; z-index:50; pointer-events:none; width:64px; height:64px; }
  .flyer svg { width:100%; height:100%; }

  /* ---------- reveal overlay ---------- */
  #overlay { position:fixed; inset:0; background:#5B3E8Cf2; z-index:100; display:none;
    flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
  #overlay.show { display:flex; animation:fadeIn .5s ease; }
  @keyframes fadeIn { from{opacity:0;} }
  #dishName { color:#fff; font-size:21px; font-weight:800; line-height:1.15; margin-bottom:4px; opacity:.95; text-shadow:0 3px 0 #0004;
    max-width:440px; opacity:0; transform:scale(.5); transition:all .8s cubic-bezier(.2,1.5,.4,1); }
  #reaction { font-size:15px; font-weight:800; margin-bottom:10px; padding:6px 14px; border-radius:16px; background:#fff;
    opacity:0; transform:scale(.5); transition:all .8s .35s cubic-bezier(.2,1.5,.4,1); }
  #overlay.revealed #dishName, #overlay.revealed #reaction { opacity:1; transform:scale(1); }
  @keyframes popIn { from{ transform:scale(0);} }

  /* ---- serving cover (cloche) ---- */
  #cloche { position:absolute; left:50%; top:14px; width:300px; margin-left:-150px; z-index:7; cursor:pointer;
    transition:transform 2.1s cubic-bezier(.5,.05,.3,1), opacity .5s 1.7s; }
  #cloche svg { display:block; animation:clocheBob 2.4s ease-in-out infinite; }
  @keyframes clocheBob { 50%{ transform:translateY(-8px) rotate(1.2deg);} }
  #cloche.lift { transform:translateY(-380px) rotate(-11deg); opacity:0; pointer-events:none; }
  #cloche.lift svg { animation:none; }
  #hint { position:absolute; left:50%; transform:translateX(-50%); top:-46px; z-index:8; white-space:nowrap;
    background:#fff; color:#8A4B12; font-weight:800; font-size:19px; padding:9px 18px; border-radius:18px;
    box-shadow:0 4px 0 #0003; animation:hintPulse 1.4s ease-in-out infinite; transition:opacity .4s; }
  @keyframes hintPulse { 50%{ transform:translateX(-50%) scale(1.09);} }
  #hint.gone { opacity:0; pointer-events:none; }
  #dishBig { opacity:0; transition:opacity .4s .5s; }
  #overlay.revealing #dishBig { opacity:1; }
  #dishIngs { opacity:0; transition:opacity .6s 1.4s; }
  #overlay.revealed #dishIngs { opacity:1; }
  .psteam { display:none; }
  #overlay.revealed .psteam { display:block; position:absolute; top:30px; width:30px; height:19px; background:#fff;
    border-radius:50%; box-shadow:-10px 6px 0 -5px #fff, 10px 6px 0 -5px #fff; animation:steamUp 3.2s ease-in-out infinite; }

  /* ---- Beepo on the reveal screen ---- */
  #revealBeepo { position:absolute; left:-62px; bottom:-6px; width:112px; z-index:5; }
  #revealBeepo svg { width:100%; height:auto; }
  #revealBeepo.exp-yum  { animation:joyBounce 1.6s ease .15s 3; }
  #revealBeepo.exp-yuck { animation:shakeNo 1.3s ease .15s 3; }
  #revealBeepo.exp-wow  { animation:wowJump 1.5s cubic-bezier(.3,1.3,.4,1) .15s 3; }
  @keyframes joyBounce { 30%{ transform:translateY(-16px) rotate(-6deg);} 60%{ transform:translateY(0);} 80%{ transform:translateY(-7px);} }
  @keyframes shakeNo { 20%{ transform:translateX(-10px) rotate(-5deg);} 50%{ transform:translateX(9px) rotate(5deg);} 80%{ transform:translateX(-5px);} }
  @keyframes wowJump { 35%{ transform:translateY(-30px) scale(1.07);} 68%{ transform:translateY(0);} }

  /* ---- Beepo facial expressions ---- */
  .fx { opacity:0; transition:opacity .4s; transform-box:fill-box; transform-origin:center; }
  .f-normal { opacity:1; }
  .exp-yum .f-normal, .exp-yuck .f-normal, .exp-wow .f-normal,
  .exp-eat .f-normal, .exp-refuse .f-normal { opacity:0; }
  .exp-yum .f-yum, .exp-yuck .f-yuck, .exp-wow .f-wow,
  .exp-eat .f-eat, .exp-refuse .f-yuck { opacity:1; animation:facePop .8s cubic-bezier(.2,1.6,.4,1); }
  @keyframes facePop { 0%{ transform:scale(.3);} 55%{ transform:scale(1.16);} 100%{ transform:scale(1);} }

  /* ---- eating & refusing ---- */
  .chompM { transform-box:fill-box; transform-origin:center; }
  .exp-eat .chompM { animation:chomp .68s ease-in-out infinite; }
  .exp-eat.fast .chompM { animation-duration:.3s; }
  @keyframes chomp { 50%{ transform:scaleY(.12);} }
  #revealBeepo.exp-eat { animation:lunge .72s ease-in-out infinite; }
  #revealBeepo.exp-eat.fast { animation-duration:.34s; }
  @keyframes lunge { 40%{ transform:translate(18px,-4px) rotate(6deg);} }
  #revealBeepo.exp-refuse { animation:refuseTurn 1.7s ease forwards; }
  @keyframes refuseTurn {
    18%{ transform:translateX(-10px) rotate(-7deg);}
    40%{ transform:translateX(8px) rotate(6deg);}
    62%{ transform:translateX(-6px) rotate(-4deg);}
    100%{ transform:scaleX(-1) translateX(-12px);} }
  #plateWrap.pushed { transform:translateX(34px) rotate(4deg); transition:transform .8s cubic-bezier(.3,1.4,.4,1); }
  #overlay.eating #dishBig { animation:none; transition:opacity .4s .5s, transform .3s cubic-bezier(.4,1.4,.5,1); }
  .crumb { position:absolute; width:9px; height:9px; border-radius:50%; z-index:8; pointer-events:none; }
  #rBubble { position:absolute; left:-56px; bottom:134px; background:#fff; border-radius:15px; padding:8px 13px;
    font-weight:800; font-size:16px; color:#8A4B12; opacity:0; transform:scale(.4); white-space:nowrap;
    transition:all .45s cubic-bezier(.2,1.5,.4,1); z-index:9; box-shadow:0 3px 0 #0003; }
  #rBubble.show { opacity:1; transform:scale(1); }
  #rBubble::after { content:''; position:absolute; bottom:-7px; left:22px; border:8px solid transparent; border-top-color:#fff; border-bottom:0; }
  #plateWrap { position:relative; width:300px; height:300px; animation:plateUp .9s cubic-bezier(.2,1.3,.4,1); }
  @keyframes plateUp { from{ transform:translateY(320px) rotate(16deg);} }
  #plate { position:absolute; inset:0; background:radial-gradient(circle at 50% 40%, #ffffff, #E8E8F0 70%, #C9C9D8);
    border-radius:50%; box-shadow:0 10px 24px #0005, inset 0 0 0 14px #DCDCEA; }
  #dishBig { position:absolute; left:50%; top:46%; transform:translate(-50%,-50%); width:214px; height:214px;
    animation:foodWig 2.6s ease-in-out infinite; }
  #dishBig svg { width:100%; height:100%; }
  @keyframes foodWig { 50%{ transform:translate(-50%,-52%) rotate(4deg);} }
  #dishIngs { position:absolute; bottom:26px; left:0; right:0; display:flex; justify-content:center; gap:8px; }
  #dishIngs svg { width:34px; height:34px; }
  .stinkLine { position:absolute; font-size:36px; animation:stinkUp 2.4s ease-in-out infinite; opacity:.8; }
  @keyframes stinkUp { 0%{ transform:translateY(10px);} 100%{ transform:translateY(-46px); opacity:0;} }
  #againBtn { margin-top:26px; width:96px; height:96px; border:none; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #FFE18A, #FFC94D);
    box-shadow:0 6px 0 #C77E12; opacity:0; transform:scale(0); pointer-events:none; }
  #againBtn.shown { opacity:1; transform:none; pointer-events:auto;
    animation:popIn .55s cubic-bezier(.3,1.6,.4,1), pulse 1.8s ease-in-out .6s infinite; }
  #againBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #C77E12; }

  .confetti { position:fixed; top:-20px; width:13px; height:13px; z-index:120; pointer-events:none;
    animation:fall linear forwards; }
  @keyframes fall { to{ transform:translate(var(--dx,0px),110vh) rotate(720deg);} }


  /* ============ Milestone 1 additions (Batch 1) ============ */

  /* ---- start / title overlay (B#2) ---- */
  #startOverlay { position:fixed; inset:0; z-index:200; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:8px; background:linear-gradient(#FFE9A8 0%, #FFD97A 55%, #FFC85C 100%); transition:opacity .55s; }
  #startOverlay.gone { opacity:0; pointer-events:none; }
  #startTitle { font-size:42px; font-weight:800; color:#8A4B12; letter-spacing:.5px; text-shadow:0 3px 0 #fff7; }
  #startBeepo { width:190px; }
  #startBeepo svg { width:100%; height:auto; animation:bob 2.2s ease-in-out infinite; }
  #startBtn { margin-top:18px; width:112px; height:112px; border:none; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #FFD36B, #F5A623); box-shadow:0 7px 0 #C77E12;
    animation:pulse 1.6s ease-in-out infinite; display:flex; align-items:center; justify-content:center; }
  #startBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #C77E12; }
  #startBtn svg { width:54px; height:54px; margin-left:6px; }

  /* ---- ingredient boing (B#4) ---- */
  .ing.boing { animation:boing .45s cubic-bezier(.3,1.8,.4,1); }
  @keyframes boing { 30%{ transform:scale(1.16,.84);} 60%{ transform:scale(.92,1.08);} }

  /* ---- tap-the-pot stirring (B#3, revised after playtest) ---- */
  #potWrap { cursor:pointer; }
  #potSpoon { position:absolute; right:-22px; top:-56px; width:100px; height:100px; z-index:6;
    opacity:0; transform:scale(0) rotate(22deg); pointer-events:none; transform-origin:65% 85%;
    transition:opacity .3s, transform .45s cubic-bezier(.3,1.6,.4,1); }
  #potSpoon.shown { opacity:1; transform:scale(1) rotate(22deg); }
  #potSpoon svg { width:100%; height:100%; }
  #potSpoon.shown svg { animation:spoonBeckon 1.5s ease-in-out infinite; transform-origin:60% 80%; }
  @keyframes spoonBeckon { 50%{ transform:rotate(-24deg) translateY(6px);} }
  #potSpoon.swirl svg { animation:spoonSwirl .6s ease-in-out; }
  @keyframes spoonSwirl { 30%{ transform:translate(-30px,6px) rotate(-38deg);} 65%{ transform:translate(8px,2px) rotate(10deg);} }

  /* ---- forgiving pot-full bounce (B#0 / C#4) ---- */
  #potWrap.happy { animation:happyWiggle .7s ease; }
  @keyframes happyWiggle { 20%{ transform:translateX(-50%) rotate(-5deg) scale(1.04);}
    45%{ transform:translateX(-50%) rotate(5deg) scale(1.05);} 70%{ transform:translateX(-50%) rotate(-2deg) scale(1.02);} }

  /* ---- tap-to-feed (B#1) ---- */
  @keyframes handBounce { 50%{ transform:translateY(-18px) scale(1.12);} }
  #revealBeepo.feeding .f-normal { opacity:0; }
  #revealBeepo.feeding .f-eat { opacity:1; }
  #revealBeepo.feeding .chompM { animation:chomp .6s ease-in-out infinite; }
  #revealBeepo.feeding.fast .chompM { animation-duration:.3s; }
  #revealBeepo.bite { animation:lunge .45s ease; }
  #plateWrap { cursor:pointer; }


  /* ============ Batch 2: wordless guidance & comedy ============ */

  /* guide hand (C#1-2, B#5) — emoji placeholder until Batch 4 SVG swap */
  #guideHand { position:fixed; z-index:300; font-size:54px; pointer-events:none; opacity:0;
    transition:opacity .3s; filter:drop-shadow(0 3px 4px #0006); }
  #guideHand.show { opacity:1; animation:handBounce 1s ease-in-out infinite; }

  /* wordless cloche cue: big hand instead of text bubble */
  #hint { background:none; box-shadow:none; font-size:56px; padding:0; top:-66px;
    filter:drop-shadow(0 3px 4px #0006); }

  /* anticipation beat (B#8) */
  #revealBeepo.lean { animation:leanIn .9s ease-in-out; }
  @keyframes leanIn { 45%{ transform:translateX(18px) rotate(5deg);} 70%{ transform:translateX(14px) rotate(4deg);} }

  /* gross-out upgrade (B#6) */
  #revealBeepo.faint { animation:faintFall 1.1s cubic-bezier(.4,.1,.6,1) forwards; }
  @keyframes faintFall {
    0%{ transform:scaleX(-1) translateX(-12px); }
    30%{ transform:scaleX(-1) translateX(-12px) translateY(4px) rotate(-12deg); }
    100%{ transform:scaleX(-1) translateX(-12px) translateY(34px) rotate(-76deg); } }
  .fly { position:absolute; font-size:22px; z-index:9; pointer-events:none;
    animation:flyOrbit 2.2s linear infinite; }
  @keyframes flyOrbit { 0%{ transform:rotate(0deg) translateX(48px) rotate(0deg);}
    100%{ transform:rotate(360deg) translateX(48px) rotate(-360deg);} }


  /* ============ Batch 3: music ============ */
  #topBtns { display:flex; gap:8px; }
  #musicBtn.off { opacity:.45; }


  /* ============ Batch 4: juice & hardening ============ */
  * { -webkit-touch-callout:none; }
  body { padding-top:env(safe-area-inset-top); padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right); padding-bottom:env(safe-area-inset-bottom); }
  #startTitle { display:flex; align-items:center; gap:8px; }
  #againBtn { display:flex; align-items:center; justify-content:center; }
  #reaction { display:flex; align-items:center; gap:8px; }
  #overlay.shake { animation:bigShake .4s ease; }
  @keyframes bigShake { 20%{ transform:translate(-5px,3px);} 40%{ transform:translate(4px,-3px);}
    60%{ transform:translate(-3px,2px);} 80%{ transform:translate(2px,2px);} }
  .floatItem.land > svg { animation:landSquash .4s cubic-bezier(.3,1.6,.4,1); }
  @keyframes landSquash { 30%{ transform:scale(1.25,.7);} 65%{ transform:scale(.9,1.1);} }


  /* ---- one-tap cook: flame badge under the pot ---- */
  #cookFlame { position:absolute; left:50%; bottom:-30px; width:64px; height:64px; margin-left:-32px;
    opacity:0; transform:scale(0); transform-origin:50% 100%; pointer-events:none;
    transition:opacity .3s, transform .4s cubic-bezier(.3,1.6,.4,1); }
  #cookFlame.lit { opacity:1; transform:scale(1); }
  #cookFlame svg { width:100%; height:100%; animation:flick .5s ease-in-out infinite alternate; transform-origin:50% 100%; }
  @keyframes flick { from{ transform:scale(1) rotate(-2deg);} to{ transform:scaleY(1.14) scaleX(.94) rotate(2deg);} }
  #cookFlame.flare { transform:scale(1.5); }

  @media (prefers-reduced-motion: reduce) {
    *,*::before,*::after { animation-duration:.01s !important; animation-iteration-count:1 !important; transition-duration:.01s !important; }
  }
</style>
</head>
<body>

<!-- ============ SVG ART LIBRARY ============ -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
<defs>
  <!-- reusable cute face: centered on origin -->
  <g id="g-face">
    <circle cx="-9" cy="0" r="3.4" fill="#4A3B47"/>
    <circle cx="9" cy="0" r="3.4" fill="#4A3B47"/>
    <path d="M-6 7 Q0 13 6 7" fill="none" stroke="#4A3B47" stroke-width="3.4" stroke-linecap="round"/>
  </g>
  <g id="g-stink">
    <path d="M0 0 q5 -8 0 -16 q-4 -6 1 -12" fill="none" stroke="#79A05B" stroke-width="4" stroke-linecap="round" opacity=".85"/>
  </g>

  <!-- ============ INGREDIENTS ============ -->
  <symbol id="ing-apple" viewBox="0 0 100 100">
    <path d="M50 32 C34 18 14 30 15 54 C16 78 34 91 50 88 C66 91 84 78 85 54 C86 30 66 18 50 32 Z"
      fill="#F25C54" stroke="#4A3B47" stroke-width="4" stroke-linejoin="round"/>
    <path d="M50 30 C49 22 51 15 56 10" fill="none" stroke="#8A5A3B" stroke-width="5" stroke-linecap="round"/>
    <path d="M56 17 C64 9 76 12 78 19 C71 26 59 25 56 17 Z" fill="#59B356" stroke="#4A3B47" stroke-width="3.5" stroke-linejoin="round"/>
    <ellipse cx="31" cy="46" rx="6" ry="9" fill="#fff" opacity=".35"/>
    <use href="#g-face" x="50" y="58"/>
  </symbol>

  <symbol id="ing-banana" viewBox="0 0 100 100">
    <path d="M28 14 C12 44 30 84 72 92 C84 94 90 83 81 77 C55 68 44 46 43 20 C42 8 32 6 28 14 Z"
      fill="#FFD94A" stroke="#4A3B47" stroke-width="4" stroke-linejoin="round"/>

/* ================= ingredients (9) ================= */

const MAX_ITEMS = 3, BITES = 5;

/* Bespoke SVG looks for combos that have them (key = sorted ids joined by +).
   Every other combo gets a generated bowl tinted from its ingredients.

const DISH_LOOKS = {

/* ================= sound ================= */
let muted = false, actx;
function unlockAudio(){ try{
  actx = actx || new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
}catch(e){} }
function beep(fn){ if(muted) return; try{
  unlockAudio();
  fn(actx);
}catch(e){} }
function tone(a, type, f1, f2, t0, dur, vol=0.18){
  const o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.setValueAtTime(f1, a.currentTime+t0);
  o.frequency.exponentialRampToValueAtTime(Math.max(f2,1), a.currentTime+t0+dur);
  g.gain.setValueAtTime(vol, a.currentTime+t0);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+t0+dur);
  o.connect(g); g.connect(a.destination);
  o.start(a.currentTime+t0); o.stop(a.currentTime+t0+dur+0.05);
}
const sPop    = ()=>beep(a=>tone(a,'sine',300,760,0,.16,.2));
const sPlop   = ()=>beep(a=>tone(a,'sine',500,160,0,.2,.2));
const sWhoosh = ()=>beep(a=>{tone(a,'triangle',220,420,0,.25,.13); tone(a,'triangle',260,480,.08,.25,.11);});
const sDing   = ()=>beep(a=>{tone(a,'sine',880,880,0,.35,.15); tone(a,'sine',1320,1320,.03,.4,.09);});
const sChime  = ()=>beep(a=>{[659,880,1319].forEach((f,i)=>tone(a,'sine',f,f,i*.12,.4,.12));});
const sTada   = ()=>beep(a=>{[523,659,784,1047].forEach((f,i)=>tone(a,'triangle',f,f,i*.14,.32,.15));});
const sPeeyew = ()=>beep(a=>{tone(a,'sawtooth',300,150,0,.4,.09); tone(a,'sawtooth',220,90,.35,.55,.09);});
const sSparkle= ()=>beep(a=>{[1047,1319,1568,2093].forEach((f,i)=>tone(a,'sine',f,f,i*.1,.25,.11));});
const sBurp   = ()=>beep(a=>tone(a,'square',140,70,0,.3,.09));
const sSizzle = ()=>beep(a=>{for(let i=0;i<8;i++)tone(a,'triangle',700+Math.random()*600,300,i*.09,.1,.05);});

const sChomp  = ()=>beep(a=>{tone(a,'square',170,70,0,.09,.11); tone(a,'triangle',420,180,.01,.07,.07);});
const sGulp   = ()=>beep(a=>tone(a,'sine',420,110,0,.28,.16));
const sNuhuh  = ()=>beep(a=>{tone(a,'triangle',330,320,0,.15,.15); tone(a,'triangle',262,250,.2,.2,.15);});
const sPluck  = ()=>beep(a=>tone(a,'sine',250,720,0,.18,.18));
const sBoing  = ()=>beep(a=>{tone(a,'sine',180,420,0,.14,.16); tone(a,'sine',420,240,.14,.16,.14);});

/* haptic taps where supported (B#10) — no-op on iOS Safari, works wrapped/Android */
function buzz(p){ try{ navigator.vibrate && navigator.vibrate(p); }catch(e){} }

/* Per-ingredient motifs (B#4) — PLAN.md §4 table */
const MOTIFS = {
  apple:    a=>{tone(a,'sine',660,660,0,.12,.16); tone(a,'sine',880,880,.13,.2,.16);},
  banana:   a=>tone(a,'sine',700,220,0,.3,.16),
  berry:    a=>{[900,1100,1300].forEach((f,i)=>tone(a,'sine',f,f,i*.07,.12,.13));},
  egg:      a=>{tone(a,'sine',520,470,0,.07,.16); tone(a,'sine',300,280,.08,.08,.1);},
  choco:    a=>tone(a,'triangle',330,290,0,.35,.15),
  cookie:   a=>{tone(a,'square',400,380,0,.06,.11); tone(a,'square',340,320,.1,.06,.11);},
  icecream: a=>tone(a,'sine',500,1200,0,.28,.14),
  worm:     a=>{tone(a,'triangle',300,430,0,.15,.14); tone(a,'triangle',430,260,.16,.2,.14);},
  rainbow:  a=>{[523,659,784,1047].forEach((f,i)=>tone(a,'sine',f,f,i*.08,.2,.12));},
};

/* Voice hook (PLAN.md §6.1/§9): VO deferred — clips drop in later as a pure
   asset add. Callers fall back to tones whenever no clip exists. */
const VOICE_CLIPS = {}; /* e.g. VOICE_CLIPS['ing-apple'] = new Audio('assets/vo/apple.mp3') */
function playVoice(id){
  const c = VOICE_CLIPS[id];
  if(!c || muted) return false;
  try{ c.currentTime = 0; c.play(); }catch(e){ return false; }
  return true;
}
function playMotif(id){
  if(playVoice('ing-'+id)) return;
  beep(a=>MOTIFS[id] && MOTIFS[id](a));
}

/* ================= procedural music loop (B#7) =================
   No audio files: a gentle ~92bpm pentatonic wander over soft triangle bass.
   Slightly randomized each bar so it never turns into an earworm. */
let musicOn = true, musicTimer = null, musicGain = null, musicBar = 0;
try{ musicOn = localStorage.getItem('bk-music')!=='0'; }catch(e){}

const M_SCALE = [262, 294, 330, 392, 440, 523, 587, 659]; /* C-pentatonic-ish */
const M_BASS  = [131, 98, 110, 147];                      /* C2 G1 A1 D2-ish walk */
const M_BEAT  = 60/92;

function mNote(f, t0, dur, type='sine', vol=.05){
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=type; o.frequency.value=f;
  g.gain.setValueAtTime(0.0001, actx.currentTime+t0);
  g.gain.linearRampToValueAtTime(vol, actx.currentTime+t0+.04);
  g.gain.exponentialRampToValueAtTime(.001, actx.currentTime+t0+dur);
  o.connect(g); g.connect(musicGain);
  o.start(actx.currentTime+t0); o.stop(actx.currentTime+t0+dur+.05);
}
function playBar(){
  if(muted || !musicOn) return;
  const bass=M_BASS[musicBar%4];
  mNote(bass, 0, M_BEAT*3.6, 'triangle', .045);
  mNote(bass*1.5, M_BEAT*2, M_BEAT*1.7, 'triangle', .028);
  for(let i=0;i<4;i++){
    if(Math.random()<.75)
      mNote(pick(M_SCALE), i*M_BEAT + (Math.random()<.3 ? M_BEAT/2 : 0), M_BEAT*.9, 'sine', .05);
  }
  if(musicBar%2===1) mNote(pick(M_SCALE)*2, M_BEAT*3, M_BEAT*.8, 'sine', .022);
  musicBar++;
}
function startMusic(){
  if(musicTimer || !musicOn || muted) return;
  unlockAudio();
  if(!actx) return;
  if(actx.state!=='running'){                 /* resume is async: retry once ready */
    try{ actx.resume().then(()=>setTimeout(startMusic,60)); }catch(e){}
    return;
  }
  if(!musicGain){ musicGain=actx.createGain(); musicGain.gain.value=.55; musicGain.connect(actx.destination); }
  playBar();
  musicTimer=setInterval(playBar, M_BEAT*4*1000);
}

  const key=ids.join('+');
  const entry=DISH_CATALOG[key] || {n:'Mystery Mush', v:'yummy'};
  let parts=DISH_LOOKS[key], svg=null;
  if(parts){ parts=parts.map(p=>[...p]); }
  else svg=funBowlSVG(ids, entry.v);   /* B#13: fallback bowls are characters, not liquid */
  return {name:entry.n, verdict:entry.v, parts, svg, size:ids.length};
}

/* B#13: generic combos get a LIVING bowl — the actual ingredients bob
   half-dipped in the tinted soup, and the soup itself has a smiley face */
function funBowlSVG(ids, verdict){
  const blend=blendColors(ids.map(id=>ING_BY_ID[id].c));
  const spots = ids.length===1 ? [[50,37,.36]]
              : ids.length===2 ? [[36,39,.32],[64,40,.32]]
              : [[29,41,.28],[50,36,.31],[71,41,.28]];
  let s=`<use href="#dish-bowl" style="color:${blend}"/>`;
  ids.forEach((id,i)=>{
    const sp=spots[i]||spots[0];
    s+=`<g transform="translate(${(sp[0]-50*sp[2]).toFixed(1)} ${(sp[1]-50*sp[2]).toFixed(1)}) scale(${sp[2]})"><use href="#${ING_BY_ID[id].svg}"/></g>`;
  });
  /* front lip of soup drawn OVER the ingredient bases = half-dipped look */
  s+=`<path d="M13 48 A37 10 0 0 0 87 48 Z" fill="${blend}" stroke="#4A3B47" stroke-width="4" stroke-linejoin="round"/>`;
  s+=`<circle cx="31" cy="52" r="2.4" fill="#fff" opacity=".5"/><circle cx="66" cy="53" r="2" fill="#fff" opacity=".45"/>`;
  s+=`<use href="#g-face" transform="translate(50 50) scale(.8)"/>`;
  if(verdict==='yucky') s+=`<use href="#top-stink"/>`;
  if(verdict==='magical') s+=`<use href="#top-sparkles"/>`;
  return s;
}

    f.style.left=(112+i*14)+'px';
    f.style.top=(92+i*16)+'px';
    f.style.animationDelay=(i*-0.7)+'s';
    f.style.animationDuration=(2+i*0.4)+'s';
    plateWrap.appendChild(f);
  }
}

function beginFeeding(tier){
  feeding=true; bitesDone=0;
  overlay.classList.add('eating');
  revealBeepo.classList.add('feeding');
  if(tier==='vor') revealBeepo.classList.add('fast');
  sayR(tier==='vor' ? pick(VOR_START) : pick(EAT_START));
  armAutoBite(900);
}
/* eating runs by itself on a tasty rhythm; taps just add bonus bites */
function armAutoBite(ms){
  clearTimeout(idleFeedTimer);
  idleFeedTimer=setTimeout(bite, ms);
}
function bite(){
  if(!feeding) return;
  bitesDone++;
  sChomp(); buzz(10);
  revealBeepo.classList.remove('bite'); void revealBeepo.offsetWidth;
  revealBeepo.classList.add('bite');
  dishBig.style.transform =
    `translate(-50%,-50%) scale(${Math.max(1-bitesDone*0.19,0.05)}) rotate(${bitesDone%2?-5:5}deg)`;
  crumbs(revealBeepo.classList.contains('fast')?4:2);
  if(bitesDone>=BITES) finishFeeding();
  else armAutoBite(revealBeepo.classList.contains('fast') ? 480 : 1050);
}
function finishFeeding(){
  feeding=false;
  clearTimeout(idleFeedTimer);
  dishBig.style.transform = 'translate(-50%,-50%) scale(0)';
  dishBig.style.opacity = '0';
  sGulp();
  schedule(()=>{
    const fast = revealBeepo.classList.contains('fast');
    revealBeepo.classList.remove('feeding','fast','bite');
    setExp(revealBeepo,'yum');
    sayR(fast ? pick(VOR_END) : pick(EAT_END));
    if(fast){ sBurp(); confettiBurst(12); } else sDing();
    $('againBtn').classList.add('shown');   /* only after the reaction */
  }, 600);
  /* auto-restart: the arrow button just skips this wait */
  schedule(()=>{ if(overlay.classList.contains('show')) $('againBtn').click(); }, 5200);
}
plateWrap.addEventListener('pointerdown', ()=>{ if(feeding) bite(); });

function crumbs(n){
  const colors=['#E0A860','#F2B04A','#FBD9E8','#FFD94A','#F27EB4'];
  for(let i=0;i<n;i++){
    const c=document.createElement('div');
    c.className='crumb';
    c.style.background=pick(colors);
    c.style.left=(130+Math.random()*44)+'px';
    c.style.top=(122+Math.random()*26)+'px';
    plateWrap.appendChild(c);
    const dx=(Math.random()*120-60), dy=-(15+Math.random()*55);
    c.animate([
      {transform:'translate(0,0) scale(1)', opacity:1},
      {transform:`translate(${dx}px,${dy}px) scale(.9)`, opacity:1, offset:.55},
      {transform:`translate(${dx*1.2}px,${dy+62}px) scale(.5)`, opacity:0}
    ],{duration:620+Math.random()*250, easing:'ease-out'}).onfinish=()=>c.remove();
  }
}

/* ================= reset ================= */
$('againBtn').addEventListener('click',()=>{
  sPop(); buzz(8);
  $('againBtn').classList.remove('shown');
  clearTimeout(autoLift);
  clearEating();
  feeding=false; bitesDone=0;
  overlay.classList.remove('show','revealing','revealed','eating');
  cloche.classList.remove('lift');
  hint.classList.remove('gone');
  revealBeepo.classList.remove('feeding','fast','bite','lean','faint');
  setExp(revealBeepo, null);
  rBubble.classList.remove('show');
  plateWrap.classList.remove('pushed');
  plateWrap.querySelectorAll('.crumb, .fly').forEach(x=>x.remove());
  dishBig.style.transform=''; dishBig.style.opacity='';
  potItems=[]; cooking=false; lifted=false;
  soupItems.querySelectorAll('.floatItem').forEach(x=>x.remove());
  soupEl.style.fill='#F2B04A';
  resetStir();
  say('What’s next, chef?');
});

/* ================= helpers ================= */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function blendColors(hexes){
  let r=0,g=0,b=0;
  hexes.forEach(h=>{ const n=parseInt(h.slice(1),16); r+=n>>16; g+=(n>>8)&255; b+=n&255; });
  const L=hexes.length;
  return `rgb(${Math.round(r/L)},${Math.round(g/L)},${Math.round(b/L)})`;
}
function confettiBurst(n){
  const colors=['#FF6B6B','#FFD93C','#6BCB77','#4D96FF','#E96BC0','#FF9F45'];
  const star='polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)';
  for(let i=0;i<n;i++){
    const c=document.createElement('div');
    c.className='confetti';
    const size=9+Math.random()*8;
    c.style.width=size+'px'; c.style.height=size+'px';
    c.style.left=Math.random()*100+'vw';
    c.style.background=pick(colors);
    const shape=Math.random();
    if(shape<.33) c.style.clipPath=star;
    else c.style.borderRadius = shape<.66 ? '50%' : '3px';
    c.style.setProperty('--dx', (Math.random()*160-80)+'px');
    c.style.animationDuration=(2.2+Math.random()*1.8)+'s';
    c.style.animationDelay=(Math.random()*.6)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }
}
</script>
