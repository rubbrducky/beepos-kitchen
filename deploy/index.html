<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Beepo's Kitchen</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html,body { height:100%; overflow:hidden; font-family:ui-rounded,'SF Pro Rounded','Arial Rounded MT Bold','Baloo 2',system-ui,sans-serif; }
  body {
    background: linear-gradient(#FFE9A8 0%, #FFD97A 55%, #FFC85C 100%);
    display:flex; flex-direction:column;
    touch-action:manipulation;
  }
  svg.icon { display:block; overflow:visible; }

  /* ---------- top bar ---------- */
  #topbar { display:flex; justify-content:flex-end; align-items:center; padding:10px 14px 0; }
  #muteBtn, #musicBtn { font-size:22px; background:#fff8; border:none; border-radius:14px; width:40px; height:40px; box-shadow:0 3px 0 #d9a94e; opacity:.85; }
  #muteBtn:active, #musicBtn:active { transform:translateY(2px); box-shadow:0 1px 0 #d9a94e; }

  /* ---------- stage ---------- */
  #stage { position:relative; height:32%; min-height:200px; display:flex; align-items:flex-end; justify-content:center; }
  #floor { position:absolute; bottom:0; left:0; right:0; height:34px;
    background: repeating-conic-gradient(#F7B34A 0% 25%, #FFDE9C 0% 50%) 0 0/34px 34px; opacity:.45; }

  /* Beepo */
  #beepo { position:absolute; left:2%; bottom:56px; width:112px; z-index:5; }
  #beepo.hop { animation:hop .7s ease; }
  @keyframes hop { 30%{transform:translateY(-16px) rotate(-4deg);} 60%{transform:translateY(0);} 80%{transform:translateY(-6px);} }
  .beye { transform-box:fill-box; transform-origin:center; animation:blink 4.6s infinite; }
  @keyframes blink { 0%,94%,100%{transform:scaleY(1);} 97%{transform:scaleY(.08);} }
  .antBall { transform-box:fill-box; transform-origin:center; animation:bob 2.2s ease-in-out infinite; }
  @keyframes bob { 50%{transform:translateY(-4px);} }
  #bubbleTalk { position:absolute; top:-14px; left:82px; background:#fff; border-radius:16px; padding:8px 13px;
    font-weight:800; font-size:16px; color:#8A4B12; opacity:0; transform:scale(.5); transition:all .35s; white-space:nowrap;
    box-shadow:0 3px 0 #d9a94e77; z-index:9;}
  #bubbleTalk.show { opacity:1; transform:scale(1); }
  #bubbleTalk::after { content:''; position:absolute; bottom:-7px; left:14px; border:8px solid transparent; border-top-color:#fff; border-bottom:0; }

  /* stove + pot — AI raster: toy-stove burner deck + steel-blue pot (§3.6) */
  #stoveWrap { position:relative; bottom:12px; width:252px; z-index:4; }
  /* toy-stove top (backsplash + burners + knobs); quiet, the POT is the hero */
  #stove { width:204px; height:91px; margin:0 auto;
    background:url("assets/ui/stove.webp") center bottom/contain no-repeat; }
  #potWrap { position:absolute; bottom:36px; left:50%; transform:translateX(-50%); width:252px; height:168px; z-index:2; }
  /* potBody = pot image + soup overlay, breathing as one object */
  #potBody { position:absolute; inset:0; animation:potBreathe 3.2s ease-in-out infinite; transform-origin:50% 90%; }
  #potImg { position:absolute; left:0; right:0; bottom:0; width:100%; }
  #potBody > svg { position:absolute; left:0; top:0; }
  /* stir-ready: the pot glows like a button */
  #potWrap.ready #potBody { animation:potBreathe 3.2s ease-in-out infinite, potGlow 1.5s ease-in-out infinite; }
  @keyframes potGlow { 50%{ filter:drop-shadow(0 0 16px #FFD94A) drop-shadow(0 0 4px #FFD94A); } }
  @keyframes potBreathe { 50%{ transform:scale(1.02) translateY(-1px);} }
  #potWrap.stirring { animation:rock .8s ease; }
  @keyframes rock { 25%{transform:translateX(-50%) rotate(-4deg);} 75%{transform:translateX(-50%) rotate(4deg);} }
  #potWrap.wobble { animation:wob .5s ease; }
  @keyframes wob { 25%{transform:translateX(-54%);} 50%{transform:translateX(-46%);} 75%{transform:translateX(-52%);} }
  #soupEllipse { fill:#F2B04A; transition: fill 1s; }
  #soupItems { position:absolute; left:31px; top:12px; width:191px; height:65px; }
  #soupItems.swirl .floatItem { animation:spin1 1s ease; }
  @keyframes spin1 { 50%{ transform:translateX(26px) rotate(180deg) scale(.85);} 100%{transform:rotate(360deg);} }
  .floatItem { position:absolute; animation:floaty 3s ease-in-out infinite; }  /* H#10d: tap-to-remove affordance removed */
  @keyframes floaty { 50%{ transform:translateY(-4px) rotate(10deg);} }
  .bubble { position:absolute; bottom:8px; width:9px; height:9px; background:#ffffff77; border-radius:50%;
    animation:rise 2.6s linear infinite; }
  @keyframes rise { 0%{transform:translateY(0) scale(.5); opacity:0;} 30%{opacity:1;} 100%{transform:translateY(-26px) scale(1.2); opacity:0;} }
  .steam { position:absolute; top:-32px; width:30px; height:19px; background:#fff; border-radius:50%;
    box-shadow:-10px 6px 0 -5px #fff, 10px 6px 0 -5px #fff;
    animation:steamUp 3.4s ease-in-out infinite; }
  @keyframes steamUp { 0%{transform:translateY(10px) scale(.7); opacity:0;} 40%{opacity:.65;} 100%{transform:translateY(-28px) scale(1.25); opacity:0;} }

  /* stir button */
  @keyframes pulse { 50%{ transform:scale(1.07);} }


  /* ---------- shelf ---------- */
  #shelfWrap { flex:1; background:linear-gradient(#D89A5F,#C9884E); border-top:8px solid #B06F35;
    border-radius:26px 26px 0 0; padding:10px 10px 14px; overflow-y:auto; box-shadow:0 -6px 14px #0002; }
  #shelf { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:480px; margin:0 auto; }
  .ing { background:linear-gradient(#FFF8E8,#FFEECB); border:none; border-radius:18px; padding:10px 4px;
    box-shadow:0 4px 0 #A9743B; font-family:inherit; transition:opacity .3s;
    display:flex; align-items:center; justify-content:center; }
  .ing svg { width:80px; height:80px; }
  .ing:active { transform:translateY(3px) scale(.96); box-shadow:0 1px 0 #A9743B; }
  @media (max-height:730px) {
    #stage { min-height:182px; }
    .ing svg { width:62px; height:62px; }
    #shelf { gap:8px; }
  }

  .flyer { position:fixed; z-index:50; pointer-events:none; width:64px; height:64px; }
  .flyer svg { width:100%; height:100%; }

  /* ---------- reveal overlay ---------- */
  #overlay { position:fixed; inset:0; background:#5B3E8Cf2; z-index:100; display:none;
    flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
  #overlay.show { display:flex; animation:fadeIn .5s ease; }
  @keyframes fadeIn { from{opacity:0;} }
  /* dish name: quiet parent-facing flavor text at the BOTTOM of the reveal */
  #dishName { color:#fff; font-size:17px; font-weight:800; line-height:1.15; margin-top:18px; text-shadow:0 3px 0 #0004;
    max-width:440px; opacity:0; transform:scale(.5); transition:all .8s .3s cubic-bezier(.2,1.5,.4,1); }
  #overlay.revealed #dishName { opacity:.9; transform:scale(1); }
  @keyframes popIn { from{ transform:scale(0);} }

  /* ---- serving cover (cloche) ---- */
  #cloche { position:absolute; left:50%; top:14px; width:300px; margin-left:-150px; z-index:7; cursor:pointer;
    transition:transform 2.1s cubic-bezier(.5,.05,.3,1), opacity .5s 1.7s; }
  #cloche svg, #cloche > img { display:block; margin:0 auto; animation:clocheBob 2.4s ease-in-out infinite; }
  @keyframes clocheBob { 50%{ transform:translateY(-8px) rotate(1.2deg);} }
  #cloche.lift { transform:translateY(-380px) rotate(-11deg); opacity:0; pointer-events:none; }
  #cloche.lift svg, #cloche.lift > img { animation:none; }
  #hint img { transform:rotate(180deg); }   /* above the lid -> finger points DOWN at it */
  #hint { position:absolute; left:50%; transform:translateX(-50%); top:-46px; z-index:8; white-space:nowrap;
    background:#fff; color:#8A4B12; font-weight:800; font-size:19px; padding:9px 18px; border-radius:18px;
    box-shadow:0 4px 0 #0003; animation:hintPulse 1.4s ease-in-out infinite; transition:opacity .4s; }
  @keyframes hintPulse { 50%{ transform:translateX(-50%) scale(1.09);} }
  #hint.gone { opacity:0; pointer-events:none; }
  #dishBig { opacity:0; transition:opacity .4s .5s; }
  #overlay.revealing #dishBig { opacity:1; }
  #dishIngs { opacity:0; transition:opacity .6s 1.4s; }
  #overlay.revealed #dishIngs { opacity:1; }
  .psteam { display:none; }
  #overlay.revealed .psteam { display:block; position:absolute; top:30px; width:30px; height:19px; background:#fff;
    border-radius:50%; box-shadow:-10px 6px 0 -5px #fff, 10px 6px 0 -5px #fff; animation:steamUp 3.2s ease-in-out infinite; }

  /* ---- Beepo on the reveal screen ---- */
  #revealBeepo { position:absolute; left:-62px; bottom:-6px; width:112px; z-index:5; }
  #revealBeepo svg { width:100%; height:auto; }
  #revealBeepo.exp-yum  { animation:joyBounce 1.6s ease .15s 3; }
  #revealBeepo.exp-yuck { animation:shakeNo 1.3s ease .15s 3; }
  #revealBeepo.exp-wow  { animation:wowJump 1.5s cubic-bezier(.3,1.3,.4,1) .15s 3; }
  @keyframes joyBounce { 30%{ transform:translateY(-16px) rotate(-6deg);} 60%{ transform:translateY(0);} 80%{ transform:translateY(-7px);} }
  @keyframes shakeNo { 20%{ transform:translateX(-10px) rotate(-5deg);} 50%{ transform:translateX(9px) rotate(5deg);} 80%{ transform:translateX(-5px);} }
  @keyframes wowJump { 35%{ transform:translateY(-30px) scale(1.07);} 68%{ transform:translateY(0);} }

  /* ---- Beepo facial expressions ---- */
  .fx { opacity:0; transition:opacity .4s; transform-box:fill-box; transform-origin:center; }
  .f-normal { opacity:1; }
  .exp-yum .f-normal, .exp-yuck .f-normal, .exp-wow .f-normal,
  .exp-eat .f-normal, .exp-refuse .f-normal { opacity:0; }
  .exp-yum .f-yum, .exp-yuck .f-yuck, .exp-wow .f-wow,
  .exp-eat .f-eat, .exp-refuse .f-yuck { opacity:1; animation:facePop .8s cubic-bezier(.2,1.6,.4,1); }
  @keyframes facePop { 0%{ transform:scale(.3);} 55%{ transform:scale(1.16);} 100%{ transform:scale(1);} }

  /* ---- eating & refusing ---- */
  .chompM { transform-box:fill-box; transform-origin:center; }
  .exp-eat .chompM { animation:chomp .68s ease-in-out infinite; }
  .exp-eat.fast .chompM { animation-duration:.3s; }
  @keyframes chomp { 50%{ transform:scaleY(.12);} }
  #revealBeepo.exp-eat { animation:lunge .72s ease-in-out infinite; }
  #revealBeepo.exp-eat.fast { animation-duration:.34s; }
  @keyframes lunge { 40%{ transform:translate(18px,-4px) rotate(6deg);} }
  #revealBeepo.exp-refuse { animation:refuseTurn 1.7s ease forwards; }
  @keyframes refuseTurn {
    18%{ transform:translateX(-10px) rotate(-7deg);}
    40%{ transform:translateX(8px) rotate(6deg);}
    62%{ transform:translateX(-6px) rotate(-4deg);}
    100%{ transform:scaleX(-1) translateX(-12px);} }
  #plateWrap.pushed { transform:translateX(34px) rotate(4deg); transition:transform .8s cubic-bezier(.3,1.4,.4,1); }
  #overlay.eating #dishBig { animation:none; transition:opacity .4s .5s, transform .3s cubic-bezier(.4,1.4,.5,1); }
  .crumb { position:absolute; width:9px; height:9px; border-radius:50%; z-index:8; pointer-events:none; }
  #rBubble { position:absolute; left:-56px; bottom:134px; background:#fff; border-radius:15px; padding:8px 13px;
    font-weight:800; font-size:16px; color:#8A4B12; opacity:0; transform:scale(.4); white-space:nowrap;
    transition:all .45s cubic-bezier(.2,1.5,.4,1); z-index:9; box-shadow:0 3px 0 #0003; }
  #rBubble.show { opacity:1; transform:scale(1); }
  #rBubble::after { content:''; position:absolute; bottom:-7px; left:22px; border:8px solid transparent; border-top-color:#fff; border-bottom:0; }
  #plateWrap { position:relative; width:300px; height:300px; animation:plateUp .9s cubic-bezier(.2,1.3,.4,1); }
  @keyframes plateUp { from{ transform:translateY(320px) rotate(16deg);} }
  #plate { position:absolute; inset:0; background:radial-gradient(circle at 50% 40%, #ffffff, #E8E8F0 70%, #C9C9D8);
    border-radius:50%; box-shadow:0 10px 24px #0005, inset 0 0 0 14px #DCDCEA; }
  #dishBig { position:absolute; left:50%; top:46%; transform:translate(-50%,-50%); width:214px; height:214px;
    animation:foodWig 2.6s ease-in-out infinite; }
  #dishBig svg { width:100%; height:100%; }
  @keyframes foodWig { 50%{ transform:translate(-50%,-52%) rotate(4deg);} }
  #dishIngs { position:absolute; bottom:22px; left:0; right:0; display:flex; justify-content:center;
    align-items:center; gap:5px; flex-wrap:wrap; padding:0 10px; }
  #dishIngs .chip svg { width:34px; height:34px; }
  #dishIngs .op svg { width:22px; height:22px; }
  #dishIngs .dishchip svg { width:46px; height:46px; }
  .stinkLine { position:absolute; font-size:36px; animation:stinkUp 2.4s ease-in-out infinite; opacity:.8; }
  @keyframes stinkUp { 0%{ transform:translateY(10px);} 100%{ transform:translateY(-46px); opacity:0;} }
  #againBtn { margin-top:26px; width:96px; height:96px; border:none; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #FFE18A, #FFC94D);
    box-shadow:0 6px 0 #C77E12; opacity:0; transform:scale(0); pointer-events:none; }
  #againBtn.shown { opacity:1; transform:none; pointer-events:auto;
    animation:popIn .55s cubic-bezier(.3,1.6,.4,1), pulse 1.8s ease-in-out .6s infinite; }
  #againBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #C77E12; }

  .confetti { position:fixed; top:-20px; width:13px; height:13px; z-index:120; pointer-events:none;
    animation:fall linear forwards; }
  @keyframes fall { to{ transform:translate(var(--dx,0px),110vh) rotate(720deg);} }


  /* ============ Milestone 1 additions (Batch 1) ============ */

  /* ---- start / title overlay (B#2) ---- */
  #startOverlay { position:fixed; inset:0; z-index:200; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:8px; background:linear-gradient(#FFE9A8 0%, #FFD97A 55%, #FFC85C 100%); transition:opacity .55s; }
  #startOverlay.gone { opacity:0; pointer-events:none; }
  #startTitle { font-size:42px; font-weight:800; color:#8A4B12; letter-spacing:.5px; text-shadow:0 3px 0 #fff7; }
  #startBeepo { width:190px; }
  #startBeepo svg { width:100%; height:auto; animation:bob 2.2s ease-in-out infinite; }
  #startBtn { margin-top:18px; width:112px; height:112px; border:none; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #FFD36B, #F5A623); box-shadow:0 7px 0 #C77E12;
    animation:pulse 1.6s ease-in-out infinite; display:flex; align-items:center; justify-content:center; }
  #startBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #C77E12; }
  #startBtn svg { width:54px; height:54px; margin-left:6px; }

  /* ---- ingredient boing (B#4) ---- */
  .ing.boing { animation:boing .45s cubic-bezier(.3,1.8,.4,1); }
  @keyframes boing { 30%{ transform:scale(1.16,.84);} 60%{ transform:scale(.92,1.08);} }

  /* ---- tap-the-pot stirring (B#3, revised after playtest) ---- */
  #potWrap { cursor:pointer; }
  #potSpoon { position:absolute; right:-22px; top:-56px; width:100px; height:100px; z-index:6;
    opacity:0; transform:scale(0) rotate(22deg); pointer-events:none; transform-origin:65% 85%;
    transition:opacity .3s, transform .45s cubic-bezier(.3,1.6,.4,1); }
  #potSpoon.shown { opacity:1; transform:scale(1) rotate(22deg); }
  #potSpoon svg, #potSpoon img { width:auto; height:100%; display:block; margin:0 auto; pointer-events:none; }
  #potSpoon.shown svg, #potSpoon.shown img { animation:spoonBeckon 1.5s ease-in-out infinite; transform-origin:60% 80%; }
  @keyframes spoonBeckon { 50%{ transform:rotate(-24deg) translateY(6px);} }
  #potSpoon.swirl svg, #potSpoon.swirl img { animation:spoonSwirl .6s ease-in-out; }
  @keyframes spoonSwirl { 30%{ transform:translate(-30px,6px) rotate(-38deg);} 65%{ transform:translate(8px,2px) rotate(10deg);} }

  /* ---- forgiving pot-full bounce (B#0 / C#4) ---- */
  #potWrap.happy { animation:happyWiggle .7s ease; }
  @keyframes happyWiggle { 20%{ transform:translateX(-50%) rotate(-5deg) scale(1.04);}
    45%{ transform:translateX(-50%) rotate(5deg) scale(1.05);} 70%{ transform:translateX(-50%) rotate(-2deg) scale(1.02);} }

  /* ---- tap-to-feed (B#1) ---- */
  @keyframes handBounce { 50%{ transform:translateY(-18px) scale(1.12);} }
  #revealBeepo.feeding .f-normal { opacity:0; }
  #revealBeepo.feeding .f-eat { opacity:1; }
  #revealBeepo.feeding .chompM { animation:chomp .6s ease-in-out infinite; }
  #revealBeepo.feeding.fast .chompM { animation-duration:.3s; }
  #revealBeepo.bite { animation:lunge .45s ease; }
  #plateWrap { cursor:pointer; }


  /* ============ Batch 2: wordless guidance & comedy ============ */

  /* guide hand (C#1-2, B#5) — emoji placeholder until Batch 4 SVG swap */
  #guideHand { position:fixed; z-index:300; font-size:54px; pointer-events:none; opacity:0;
    transition:opacity .3s; filter:drop-shadow(0 3px 4px #0006); }
  #guideHand.show { opacity:1; animation:handBounce 1s ease-in-out infinite; }

  /* wordless cloche cue: big hand instead of text bubble */
  #hint { background:none; box-shadow:none; font-size:56px; padding:0; top:-66px;
    filter:drop-shadow(0 3px 4px #0006); }

  /* anticipation beat (B#8) */
  #revealBeepo.lean { animation:leanIn .9s ease-in-out; }
  @keyframes leanIn { 45%{ transform:translateX(18px) rotate(5deg);} 70%{ transform:translateX(14px) rotate(4deg);} }

  /* gross-out upgrade (B#6) */
  #revealBeepo.faint { animation:faintFall 1.1s cubic-bezier(.4,.1,.6,1) forwards; }
  @keyframes faintFall {
    0%{ transform:scaleX(-1) translateX(-12px); }
    30%{ transform:scaleX(-1) translateX(-12px) translateY(4px) rotate(-12deg); }
    100%{ transform:scaleX(-1) translateX(-12px) translateY(34px) rotate(-76deg); } }
  .fly { position:absolute; font-size:22px; z-index:9; pointer-events:none;
    animation:flyOrbit 2.2s linear infinite; }
  @keyframes flyOrbit { 0%{ transform:rotate(0deg) translateX(48px) rotate(0deg);}
    100%{ transform:rotate(360deg) translateX(48px) rotate(-360deg);} }


  /* ============ Batch 3: music ============ */
  #topBtns { display:flex; gap:8px; }
  #musicBtn.off { opacity:.45; }


  /* ============ Batch 4: juice & hardening ============ */
  * { -webkit-touch-callout:none; }
  body { padding-top:env(safe-area-inset-top); padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right); padding-bottom:env(safe-area-inset-bottom); }
  #startTitle { display:flex; align-items:center; gap:8px; }
  #againBtn { display:flex; align-items:center; justify-content:center; }
  #overlay.shake { animation:bigShake .4s ease; }
  @keyframes bigShake { 20%{ transform:translate(-5px,3px);} 40%{ transform:translate(4px,-3px);}
    60%{ transform:translate(-3px,2px);} 80%{ transform:translate(2px,2px);} }
  .floatItem.land > svg { animation:landSquash .4s cubic-bezier(.3,1.6,.4,1); }
  @keyframes landSquash { 30%{ transform:scale(1.25,.7);} 65%{ transform:scale(.9,1.1);} }


  /* ---- one-tap cook: burner flame on the stove, under the pot (does NOT rock with it) ---- */
  #cookFlame { position:absolute; left:50%; bottom:6px; width:64px; height:64px; margin-left:-32px;
    z-index:1; opacity:0; transform:scale(0); transform-origin:50% 100%; pointer-events:none;
    transition:opacity .3s, transform .4s cubic-bezier(.3,1.6,.4,1); }
  #cookFlame.lit { opacity:1; transform:scale(1); }
  #cookFlame svg { width:100%; height:100%; animation:flick .5s ease-in-out infinite alternate; transform-origin:50% 100%; }
  @keyframes flick { from{ transform:scale(1) rotate(-2deg);} to{ transform:scaleY(1.14) scaleX(.94) rotate(2deg);} }
  /* cooking focus moment: big flame + warm pot glow, unchosen ingredients fade back */
  #cookFlame.flare { transform:scale(2.1);
    filter:drop-shadow(0 0 16px #FFB13B) drop-shadow(0 0 36px #FF8C00aa); }
  #potBody.cookGlow { animation:potBreathe 3.2s ease-in-out infinite, cookGlow 1s ease-in-out infinite; }
  @keyframes cookGlow { 50%{ filter:drop-shadow(0 0 22px #FFB13B) drop-shadow(0 4px 10px #FF8C0088); } }
  .ing.dim { opacity:.22; }


  /* ============ Batch 4.5: B#14 layered dish + B#15 equation strip ============ */
  /* B#14: stacked dish layers — only .lyr-food is ever scaled/removed while eating */
  #dishBig .lyr { position:absolute; inset:0; width:100%; height:100%; }
  #dishBig .lyr-food { transform-origin:50% 82%; }
  #dishBig.eat-whole .lyr-food { transform-origin:30% 66%; }   /* bespoke: shrink toward Beepo */
  #overlay.eating #dishBig .lyr-food { transition:transform .32s cubic-bezier(.4,1.4,.5,1), opacity .3s; }
  .lyr-food.wobble { animation:foodWobble .4s ease; }
  @keyframes foodWobble { 30%{ transform:scale(1.08) rotate(-3deg);} 60%{ transform:scale(.96) rotate(3deg);} }
  .lyr-vessel.clean { animation:vesselShine .8s ease-out; }
  @keyframes vesselShine { 0%{ filter:none;} 35%{ filter:brightness(1.5) drop-shadow(0 0 9px #fff);} 100%{ filter:none;} }

  /* B#15: recipe equation strip — chips stagger in after the reveal */
  #dishIngs .req { display:inline-flex; align-items:center; justify-content:center; opacity:0; }
  #overlay.revealed #dishIngs .req { opacity:1; animation:chipPop .5s cubic-bezier(.3,1.7,.4,1) both; }
  @keyframes chipPop { 0%{ transform:scale(0);} 60%{ transform:scale(1.15);} 100%{ transform:scale(1);} }
  #dishIngs .chip, #dishIngs .dishchip { background:#ffffff26; border-radius:12px; padding:2px; }
  #overlay.revealed #dishIngs .chip.boing { animation:boing .45s cubic-bezier(.3,1.8,.4,1); }
  #overlay.revealed #dishIngs .chip.wiggle { animation:chipWiggle .5s ease infinite; }
  @keyframes chipWiggle { 25%{ transform:rotate(-12deg);} 75%{ transform:rotate(12deg);} }

  /* ============ B#16: recipe book ============ */
  #bookBtn { position:fixed; top:calc(env(safe-area-inset-top) + 12px); left:14px; z-index:80;
    width:60px; height:60px; border:none; border-radius:18px; background:linear-gradient(#FFF3D6,#FFE1A6);
    box-shadow:0 4px 0 #C99A2E; display:none; align-items:center; justify-content:center; }
  #bookBtn.has { display:flex; }
  #bookBtn:active { transform:translateY(3px); box-shadow:0 1px 0 #C99A2E; }
  #bookBtn.boing { animation:boing .5s cubic-bezier(.3,1.8,.4,1); }
  #bookBtn.badge::after { content:''; position:absolute; top:-4px; right:-4px; width:16px; height:16px;
    border-radius:50%; background:#F04E6E; border:2px solid #fff; }
  #newStamp { position:absolute; top:38px; right:22px; z-index:11; pointer-events:none; }

  #bookOverlay { position:fixed; inset:0; z-index:150; display:none; flex-direction:column;
    background:linear-gradient(#FFF3D6,#FBE1AE); }
  #bookOverlay.show { display:flex; animation:fadeIn .35s ease; }
  #bookHeader { display:flex; align-items:center; justify-content:center; gap:8px; padding:16px 16px 8px;
    font-size:23px; font-weight:800; color:#8A4B12; }
  #bookClose { position:absolute; top:12px; right:14px; width:52px; height:52px; border:none; border-radius:50%;
    background:#fff9; box-shadow:0 3px 0 #d9a94e; display:flex; align-items:center; justify-content:center; }
  #bookClose:active { transform:translateY(2px); box-shadow:0 1px 0 #d9a94e; }
  #bookScroll { flex:1; overflow-y:auto; padding:8px 14px 28px; display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; align-content:start; }
  .bk-card { background:#fff; border-radius:20px; box-shadow:0 5px 0 #E4C98A; padding:12px 8px 10px;
    display:flex; flex-direction:column; align-items:center; text-align:center; }
  .bk-card.cardpop { animation:boing .5s cubic-bezier(.3,1.8,.4,1); }
  .bk-card.teaser { background:#FFFDF6; border:3px dashed #E4C98A; box-shadow:none;
    flex-direction:row; flex-wrap:wrap; justify-content:center; align-items:center; gap:3px; min-height:118px; }
  .bk-dish { width:88px; height:88px; }
  .bk-dish svg { width:100%; height:100%; }
  .bk-strip { display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:2px; margin-top:4px; }
  .bk-strip .req { display:inline-flex; align-items:center; opacity:1; }
  .bk-strip .chip svg { width:24px; height:24px; }
  .bk-strip .op svg { width:15px; height:15px; }
  .bk-strip .dishchip svg { width:32px; height:32px; }
  .bk-name { font-weight:800; font-size:13px; color:#6A4A2A; line-height:1.12; margin-top:6px; }
  .bk-date { font-size:10px; color:#B79A6E; margin-top:3px; }
  .bk-chip, .bk-op, .bk-q { display:inline-flex; align-items:center; }
  .bk-q { animation:pulse 1.4s ease-in-out infinite; }

  /* H#9: landscape / short viewports — keep the replay button on-screen */
  @media (max-height:560px) {
    #plateWrap { width:212px; height:212px; }
    #dishBig { width:150px; height:150px; }
    #againBtn { width:76px; height:76px; margin-top:14px; }
    #dishName { font-size:18px; }
    #dishIngs { bottom:14px; }
  }

  /* H#8: curated reduced-motion — kill shakes / big travel / confetti, KEEP the wordless cue pulses
     (potGlow, hintPulse, #againBtn + #startBtn pulse, guide-hand bounce, bob, blink, spoonBeckon, flick) */
  @media (prefers-reduced-motion: reduce) {
    .confetti, .splashDrop, .splashRing, #wormCameo { display:none !important; }
    .fly, .crumb, .steam, .bubble, .psteam,
    #overlay.shake, .lyr-food.wobble, #dishBig, #plateWrap, #dishBig.chomped,
    #cloche.rattle svg, #cloche.rattle > img, #soupEllipse.shimmer, #soupFace.lick .tongue,
    #beepo.hop, #revealBeepo.faint, #revealBeepo.exp-yum, #revealBeepo.exp-yuck,
    #revealBeepo.exp-wow, #revealBeepo.exp-refuse, #revealBeepo.exp-eat, #revealBeepo.feeding { animation:none !important; }
  }

  /* ============ Juice pass: 10 fun-enhancers (no new mechanics) ============ */
  /* #1 Beepo watches the flying food: lean + face group shifts toward the pot */
  #beepo svg { transition: transform .25s ease; }
  #beepo.watch svg { transform: rotate(4deg) translateX(7px); }
  #beepo .fx { transition: transform .25s ease; }
  #beepo.watch .f-normal { transform: translate(5px,-3px); }
  /* #2 landing splash */
  .splashDrop { position:absolute; width:10px; height:10px; border-radius:50% 50% 60% 60%; z-index:5; pointer-events:none; }
  .splashRing { position:absolute; left:50%; top:38px; width:30px; height:11px; margin-left:-15px;
    border:3px solid #ffffffaa; border-radius:50%; pointer-events:none; z-index:5; animation:ringOut .5s ease-out forwards; }
  @keyframes ringOut { to { transform:scale(2.6); opacity:0; } }
  /* #3 soup face (+ lip-lick before cooking) */
  #soupFace { opacity:0; transition:opacity .5s; }
  #soupFace.on { opacity:1; }
  #soupFace .tongue { opacity:0; transform-box:fill-box; transform-origin:50% 0; }
  #soupFace.lick .tongue { opacity:1; animation:tongueWig .45s ease 3; }
  @keyframes tongueWig { 50% { transform:translateY(2.5px) scaleY(1.2); } }
  /* #5 cloche rattle tease (something inside is alive) */
  #cloche.rattle svg, #cloche.rattle > img { animation:rattle .55s ease; }
  @keyframes rattle { 20%{ transform:translateX(-3px) rotate(-2deg);} 40%{ transform:translateX(3px) rotate(2deg);}
    60%{ transform:translateX(-2px) rotate(-1deg);} 80%{ transform:translateX(2px) rotate(1deg);} }
  /* #6 dish ta-da entrance + per-bite giggle-jiggle */
  #overlay.revealing:not(.eating) #dishBig { animation:dishTada .65s cubic-bezier(.3,1.6,.4,1), foodWig 2.6s ease-in-out .65s infinite; }
  @keyframes dishTada { 0%{ transform:translate(-50%,-50%) scale(.2) rotate(-8deg);}
    60%{ transform:translate(-50%,-50%) scale(1.12) rotate(3deg);} 100%{ transform:translate(-50%,-50%) scale(1);} }
  #overlay.eating #dishBig.chomped { animation:chompJig .35s ease; }
  @keyframes chompJig { 30%{ transform:translate(-50%,-50%) rotate(-4deg) scale(1.04);} 65%{ transform:translate(-50%,-52%) rotate(3deg);} }
  /* #7 belly grows per bite */
  .torso { transform-box:fill-box; transform-origin:50% 95%; transition:transform .3s cubic-bezier(.3,1.5,.4,1); }
  /* #9 worm cameo (rare peek from behind the counter) */
  #wormCameo { position:absolute; right:-30px; bottom:4px; z-index:1; pointer-events:none; }
  /* #10 rainbow soup shimmer */
  #soupEllipse.shimmer { animation:hueShift 2.5s linear infinite; }
  @keyframes hueShift { to { filter:hue-rotate(360deg); } }

  /* ============ Raster reskin (§3.6): AI PNGs for ingredients + dishes ============ */
  .ingimg, .dishimg { object-fit:contain; display:block; pointer-events:none; }
  #dishBig img.lyr-food { width:100%; height:100%; object-fit:contain; }
  .bk-dishimg { width:100%; height:100%; object-fit:contain; pointer-events:none; }
  @media (max-height:730px) { .ing .ingimg { width:62px; height:62px; } }
</style>
</head>

let muted = false, actx, masterComp = null;
function unlockAudio(){ try{
  actx = actx || new (window.AudioContext||window.webkitAudioContext)();
  /* H#7: one shared compressor so a two-handed mash can't stack into hard clipping */
  if(!masterComp){ masterComp = actx.createDynamicsCompressor(); masterComp.connect(actx.destination); }
  if(actx.state==='suspended') actx.resume();
}catch(e){} }
function beep(fn){ if(muted) return; try{
  unlockAudio();
  fn(actx);
}catch(e){} }
let PAN = 0;   /* transient stereo position for the next beep() — set, play, reset */
function tone(a, type, f1, f2, t0, dur, vol=0.18){
  const o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.setValueAtTime(f1, a.currentTime+t0);
  o.frequency.exponentialRampToValueAtTime(Math.max(f2,1), a.currentTime+t0+dur);
  g.gain.setValueAtTime(vol, a.currentTime+t0);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+t0+dur);
  let dest = masterComp||a.destination;
  if(PAN && a.createStereoPanner){ const p=a.createStereoPanner(); p.pan.value=PAN; p.connect(dest); dest=p; }
  o.connect(g); g.connect(dest);   /* H#7 compressor + optional pan */
  o.start(a.currentTime+t0); o.stop(a.currentTime+t0+dur+0.05);
}
/* filtered-noise sizzle — sounds like an actual pan, not bleeps */
function sizzleNoise(dur=1.5, vol=.055){
  if(muted) return;
  try{
    unlockAudio(); if(!actx) return;
    const n=Math.floor(actx.sampleRate*dur), buf=actx.createBuffer(1,n,actx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const src=actx.createBufferSource(); src.buffer=buf;
    const f=actx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=5200; f.Q.value=.8;
    const g=actx.createGain(); g.gain.value=vol;
    src.connect(f); f.connect(g); g.connect(masterComp||actx.destination);
    src.start();
  }catch(e){}
}
/* duck the music under big stingers so they punch through, then ease back */
function duckMusic(ms=1400){
  if(!musicGain || !actx) return;
  try{
    const g=musicGain.gain, t=actx.currentTime;
    g.cancelScheduledValues(t); g.setValueAtTime(.2, t);
    g.linearRampToValueAtTime(.55, t+ms/1000);
  }catch(e){}
}

/* Per-ingredient motifs (B#4) — PLAN.md §4 table */
const MOTIFS = {
  apple:    a=>{tone(a,'sine',660,660,0,.12,.16); tone(a,'sine',880,880,.13,.2,.16);},
  banana:   a=>tone(a,'sine',700,220,0,.3,.16),
  berry:    a=>{[900,1100,1300].forEach((f,i)=>tone(a,'sine',f,f,i*.07,.12,.13));},
  egg:      a=>{tone(a,'sine',520,470,0,.07,.16); tone(a,'sine',300,280,.08,.08,.1);},
  choco:    a=>tone(a,'triangle',330,290,0,.35,.15),
  cookie:   a=>{tone(a,'square',400,380,0,.06,.11); tone(a,'square',340,320,.1,.06,.11);},
  icecream: a=>tone(a,'sine',500,1200,0,.28,.14),
  worm:     a=>{tone(a,'triangle',300,430,0,.15,.14); tone(a,'triangle',430,260,.16,.2,.14);},
  rainbow:  a=>{[523,659,784,1047].forEach((f,i)=>tone(a,'sine',f,f,i*.08,.2,.12));},
};

/* Voice hook (PLAN.md §6.1/§9): VO deferred — clips drop in later as a pure
   asset add. Callers fall back to tones whenever no clip exists. */
const VOICE_CLIPS = {}; /* e.g. VOICE_CLIPS['ing-apple'] = new Audio('assets/vo/apple.mp3') */
function playVoice(id){
  const c = VOICE_CLIPS[id];
  if(!c || muted) return false;
  try{ c.currentTime = 0; c.play(); }catch(e){ return false; }
  return true;
}
function playMotif(id){
  if(playVoice('ing-'+id)) return;
  beep(a=>MOTIFS[id] && MOTIFS[id](a));
}

/* ================= procedural music loop (B#7) =================
   No audio files: a gentle ~92bpm pentatonic wander over soft triangle bass.
   Slightly randomized each bar so it never turns into an earworm. */
let musicOn = true, musicTimer = null, musicGain = null, musicBar = 0;
try{ musicOn = localStorage.getItem('bk-music')!=='0'; }catch(e){}

const M_SCALE = [262, 294, 330, 392, 440, 523, 587, 659]; /* C-pentatonic-ish */
const M_BASS  = [131, 98, 110, 147];                      /* C2 G1 A1 D2-ish walk */
const M_BEAT  = 60/92;

function mNote(f, t0, dur, type='sine', vol=.05){
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=type; o.frequency.value=f;
  g.gain.setValueAtTime(0.0001, actx.currentTime+t0);
  g.gain.linearRampToValueAtTime(vol, actx.currentTime+t0+.04);
  g.gain.exponentialRampToValueAtTime(.001, actx.currentTime+t0+dur);
  o.connect(g); g.connect(musicGain);
  o.start(actx.currentTime+t0); o.stop(actx.currentTime+t0+dur+.05);
}
function playBar(){
  if(muted || !musicOn) return;
  const bass=M_BASS[musicBar%4];
  mNote(bass, 0, M_BEAT*3.6, 'triangle', .045);
  mNote(bass*1.5, M_BEAT*2, M_BEAT*1.7, 'triangle', .028);
  for(let i=0;i<4;i++){
    if(Math.random()<.75)
      mNote(pick(M_SCALE), i*M_BEAT + (Math.random()<.3 ? M_BEAT/2 : 0), M_BEAT*.9, 'sine', .05);
  }
  if(musicBar%2===1) mNote(pick(M_SCALE)*2, M_BEAT*3, M_BEAT*.8, 'sine', .022);
  musicBar++;
}
function startMusic(){
  if(musicTimer || !musicOn || muted) return;
  unlockAudio();
  if(!actx) return;
  if(actx.state!=='running'){                 /* resume is async: retry once ready */
    try{ actx.resume().then(()=>setTimeout(startMusic,60)); }catch(e){}
    return;
  }
  if(!musicGain){ musicGain=actx.createGain(); musicGain.gain.value=.55; musicGain.connect(masterComp||actx.destination); }  /* H#7 */
  playBar();
  musicTimer=setInterval(playBar, M_BEAT*4*1000);
}
function stopMusic(){ clearInterval(musicTimer); musicTimer=null; }
/* H#10b: never build an AudioContext before the title tap (iOS pre-gesture guard) */
document.addEventListener('visibilitychange', ()=>{ document.hidden ? stopMusic() : (titleTapped && startMusic()); });

let idleTimer, attractN=0;

/* ================= add ingredient (B#0: overlapping flyers) ================= */
function addIngredient(item, btn){
  if(Date.now()-overlayClosedAt < 400) return;   /* H#1: swallow the ghost tap right after reset */
  /* every tap responds instantly: boing + motif, no shelf lockout */
  btn.classList.remove('boing'); void btn.offsetWidth; btn.classList.add('boing');
  PAN = (INGREDIENTS.indexOf(item)%3 - 1) * .35;   /* motif pans with the shelf column */
  playMotif(item.id); PAN = 0;
  buzz(8);
  if(cooking) return;                            /* H#5: feedback given; just don't spawn a flyer mid-cook */
  /* juice #1: Beepo leans in and his face follows the flying food */
  beepo.classList.add('watch');
  clearTimeout(watchTimer); watchTimer=setTimeout(()=>beepo.classList.remove('watch'), 560);
  const from=btn.getBoundingClientRect(), to=potWrap.getBoundingClientRect();
  const fl=document.createElement('div');
  fl.className='flyer'; fl.innerHTML=ingImg(item.id,64);
  fl.style.left=(from.left+from.width/2-32)+'px';
  fl.style.top=(from.top+4)+'px';
  document.body.appendChild(fl);
  const dx=(to.left+to.width/2-32)-(from.left+from.width/2-32);
  const dy=(to.top+14)-(from.top+4);
  fl.animate([
    {transform:'translate(0,0) scale(1) rotate(0deg)'},
    {transform:`translate(${dx*0.5}px, ${dy-120}px) scale(1.1) rotate(160deg)`, offset:.55},
    {transform:`translate(${dx}px, ${dy}px) scale(.55) rotate(330deg)`}
  ],{duration:450, easing:'cubic-bezier(.35,.5,.5,1)'}).onfinish=()=>{
    fl.remove();
    if(cooking){ bounceOff(item, to); return; }   /* H#5: land mid-cook → bounce off, never vanish */
    if(potItems.length>=MAX_ITEMS) bounceOff(item, to);
    else landInPot(item);
  };
}

const SLOT_X = [0, 61, 122], SLOT_Y = [-20, -11, -20], FLOAT_SIZE = 70;  /* tuned to the 252px pot */
function landInPot(item){
  const used = new Set(potItems.map(e=>e.slot));
  const free = [0,1,2].filter(s=>!used.has(s));
  const slot = free.length ? pick(free) : 0;
  const entry = {...item, uid:++uidCounter, slot};
  potItems.push(entry);
  sPlopN(potItems.length);                                  /* juice #2: rising plop melody */
  splash();
  $('soupFace').classList.add('on');                        /* juice #3: the soup wakes up */
  soupEl.classList.toggle('shimmer', !REDUCED && potItems.some(i=>i.id==='rainbow'));  /* juice #10 */
  const f=document.createElement('div');
  f.className='floatItem'; f.innerHTML=ingImg(item.id,FLOAT_SIZE);
  f.style.left=(SLOT_X[slot] + (Math.random()*4-2))+'px';
  f.style.top=(SLOT_Y[slot] + (Math.random()*4-2))+'px';
  f.style.animationDelay=(Math.random()*2)+'s';
  f.dataset.uid = entry.uid;
  soupItems.appendChild(f);
  f.classList.add('land'); buzz(12);
  soupEl.style.fill = blendColors(potItems.map(i=>i.c));
  potWrap.classList.remove('stirring'); void potWrap.offsetWidth;
  potWrap.classList.add('stirring');
  beepo.classList.remove('hop'); void beepo.offsetWidth; beepo.classList.add('hop');
  if(item.tag==='yucky'){ say(pick(YUCKY_LINES)); sPeeyew(); setExp(beepo,'yuck',1700); }
  else if(item.tag==='magic'){ say('Oooh magic!'); sSparkle(); setExp(beepo,'wow',1700); }
  else {
    /* early word learning: sometimes name the ingredient (B#4) */
    say(Math.random()<0.4 ? item.n+'!' : pick(ADD_LINES));
    setExp(beepo,'yum',1300);
  }
  cookFlame.classList.add('lit');    /* flame on = it's cooking, no tap needed */
  potSpoon.classList.add('shown');
  potWrap.classList.add('ready');
  /* AUTO-COOK: fires by itself — soon when full, patient otherwise.
     Every new ingredient resets the timer; a pot tap just cooks sooner. */
  clearTimeout(cookTimer);
  cookTimer=setTimeout(cookNow, potItems.length>=MAX_ITEMS ? 1300 : 4200);
}

/* ================= find the dish (129-dish catalog) ================= */
function findDish(ids){
  ids = ids || [...new Set(potItems.map(i=>i.id))].sort();   /* B#16: book renders any combo */
  const key=ids.join('+');
  const entry=DISH_CATALOG[key] || {n:'Mystery Mush', v:'yummy'};
  const parts=DISH_LOOKS[key];
  let layers, eatWhole=false;
  if(parts && EAT_WHOLE_LOOKS.has(parts[0][0])){        /* bespoke non-bowl look */
    eatWhole=true;
    layers={vessel:'', food:parts.map(useTag).join(''), vfront:'', fx:''};
  } else if(parts){                                     /* dish-bowl-based look */
    layers=bowlLookLayers(parts, entry.v);
  } else {                                              /* generic living bowl */
    layers=funBowlLayers(ids, entry.v);
  }
  return {name:entry.n, verdict:entry.v, key, ids, size:ids.length, eatWhole, layers,
          art: (typeof DISH_ART!=='undefined' && DISH_ART[key]) || null};   /* raster reskin §3.6 */
}

/* ================= B#14: four-layer dish rendering =================
   Every dish is stacked layers so the vessel is NEVER eaten:
     lyr-vessel (bowl, static) · lyr-food (soup+ingredients, depletes) ·
     lyr-vfront (reserved) · lyr-fx (steam/verdict toppers, static).
   Bespoke non-bowl looks are 'eatWhole': the whole dish IS the food layer and
   shrinks toward Beepo's mouth (no separate vessel). */
const EAT_WHOLE_LOOKS = new Set(['dish-split','dish-jar','dish-sundae','dish-cone',
  'dish-icesand','dish-pie','dish-cake','dish-pops','dish-donut','dish-pancakes',
  'dish-custard','dish-bday','dish-cookiemush','dish-taco','dish-burger','dish-smoothie']);
const FX_TOPPERS = new Set(['top-sparkles','top-stink','top-question']);  /* never bitten */

function useTag(p){ return `<use href="#${p[0]}"${p[1]?` style="color:${p[1]}"`:''}/>`; }
function fxForVerdict(v){ return v==='yucky' ? '<use href="#top-stink"/>'
                              : v==='magical' ? '<use href="#top-sparkles"/>' : ''; }

/* B#13: generic combos get a LIVING bowl — ingredients bob half-dipped in tinted
   soup with a smiley face; the soup + dips are the depletable food layer. */
function funBowlLayers(ids, verdict){
  const blend=blendColors(ids.map(id=>ING_BY_ID[id].c));
  const spots = ids.length===1 ? [[50,37,.36]]
              : ids.length===2 ? [[36,39,.32],[64,40,.32]]
              : [[29,41,.28],[50,36,.31],[71,41,.28]];
  let food=`<use href="#dish-soup" style="color:${blend}"/>`;
  ids.forEach((id,i)=>{
    const sp=spots[i]||spots[0];
    food+=`<g class="food-chunk" data-id="${id}" transform="translate(${(sp[0]-50*sp[2]).toFixed(1)} ${(sp[1]-50*sp[2]).toFixed(1)}) scale(${sp[2]})"><use href="#${ING_BY_ID[id].svg}"/></g>`;
  });
  /* front lip of soup over the ingredient bases = half-dipped look (sinks with the food) */
  food+=`<path d="M13 48 A37 10 0 0 0 87 48 Z" fill="${blend}" stroke="#4A3B47" stroke-width="4" stroke-linejoin="round"/>`;
  food+=`<circle cx="31" cy="52" r="2.4" fill="#fff" opacity=".5"/><circle cx="66" cy="53" r="2" fill="#fff" opacity=".45"/>`;
  food+=`<use href="#g-face" transform="translate(50 50) scale(.8)"/>`;
  return {vessel:'<use href="#dish-bowl-shell"/>', food, vfront:'', fx:fxForVerdict(verdict)};
}

/* DISH_LOOKS entries built on dish-bowl: same split, single-color soup + toppers */
function bowlLookLayers(parts, verdict){
  const color=parts[0][1]||'#F2B04A';
  let food=`<use href="#dish-soup" style="color:${color}"/>`, fx=fxForVerdict(verdict);
  parts.slice(1).forEach(p=>{ (FX_TOPPERS.has(p[0]) ? fx+=useTag(p) : food+=useTag(p)); });
  food+='<use href="#g-face" transform="translate(50 50) scale(.8)"/>';
  return {vessel:'<use href="#dish-bowl-shell"/>', food, vfront:'', fx};
}

/* ================= B#15: recipe equation strip =================
   [ing] + [ing] = [mini dish], built from the deduped/sorted key ids (never raw
   potItems), so it never teaches that quantity matters. Rides the #dishIngs slot
   during eating — zero added loop time. Chips stagger in and are tappable. */
function recipeStripHTML(ids, layers, verdict, art){
  let out='', i=0;
  const cell=(inner,cls,attr='')=>`<span class="req ${cls}" style="animation-delay:${(1.2+(i++)*0.15).toFixed(2)}s" ${attr}>${inner}</span>`;
  ids.forEach((id,k)=>{
    if(k) out+=cell('<svg class="icon" viewBox="0 0 100 100" width="20" height="20"><use href="#ui-plus"/></svg>','op');
    out+=cell(ingImg(id,34),'chip',`data-id="${id}"`);
  });
  out+=cell('<svg class="icon" viewBox="0 0 100 100" width="22" height="22"><use href="#ui-equals"/></svg>','op');
  const mini = art ? `<img class="dishimg" src="assets/dish/${art}" width="46" height="46" alt="" draggable="false">`
                   : `<svg viewBox="0 0 100 100" width="46" height="46">${layers.vessel}${layers.food}${layers.fx}</svg>`;
  out+=cell(mini,'dishchip '+verdict);
  return out;
}

/* ================= reveal (under a cover!) ================= */
const cloche=$('cloche'), hint=$('hint');
let lifted=false, autoLift=null, anticTimer=null, rattleTimer=null, pendingResult=null;

function reveal(){
  const dish = findDish();
  /* H#3: the max celebration is now a reward, not the default — 3-ingredient or magical only */
  const tier = dish.verdict==='yucky' ? 'refuse'
             : (dish.verdict==='magical' || dish.size>=3) ? 'vor' : 'ok';
  pendingResult = {verdict:dish.verdict, tier, name:dish.name, key:dish.key, ids:dish.ids, eatWhole:dish.eatWhole};

  dishName.textContent = dish.name;
  const L=dish.layers;
  if(dish.art){                     /* raster reskin: AI food PNG shrinks; the #plate div is the persistent vessel */
    dishBig.className='eat-whole raster';
    dishBig.innerHTML=`<img class="lyr lyr-food" src="assets/dish/${dish.art}" alt="" draggable="false">`;
  } else {
    dishBig.className = dish.eatWhole ? 'eat-whole' : '';
    dishBig.innerHTML =
      `<svg class="lyr lyr-vessel" viewBox="0 0 100 100">${L.vessel}</svg>`+
      `<svg class="lyr lyr-food" viewBox="0 0 100 100">${L.food}</svg>`+
      `<svg class="lyr lyr-vfront" viewBox="0 0 100 100">${L.vfront}</svg>`+
      `<svg class="lyr lyr-fx" viewBox="0 0 100 100">${L.fx}</svg>`;
  }
  dishIngs.innerHTML = recipeStripHTML(dish.ids, L, dish.verdict, dish.art);   /* B#15 */

  /* reset to covered state */
  lifted=false;
  plateWrap.querySelectorAll('.stinkLine').forEach(x=>x.remove());
  overlay.classList.remove('revealing','revealed');
  cloche.classList.remove('lift');
  hint.classList.remove('gone');
  setExp(revealBeepo, null);
  hideHand();
  overlay.classList.add('show');
  clearTimeout(autoLift); clearTimeout(anticTimer); clearTimeout(rattleTimer);
  /* juice #5: the cloche rattles like something inside is alive */
  rattleTimer = setTimeout(()=>{
    if(lifted || REDUCED) return;
    cloche.classList.remove('rattle'); void cloche.offsetWidth; cloche.classList.add('rattle');
    beep(a=>{ tone(a,'sine',175,140,0,.11,.12); tone(a,'sine',185,150,.17,.11,.12); });
    buzz([10,60,10]);
    setTimeout(()=>cloche.classList.remove('rattle'), 650);
  }, 1500);
  /* anticipation beat (B#8): lean in with an "Ooh?" just before the auto-lift */
  anticTimer = setTimeout(()=>{
    if(lifted) return;
    revealBeepo.classList.remove('lean'); void revealBeepo.offsetWidth;
    revealBeepo.classList.add('lean');
    sayR('Ooh?');
    beep(a=>tone(a,'sine',280,760,0,.6,.1));
  }, 2800);
  autoLift = setTimeout(liftCover, 4000);
}

function liftCover(){
  if(lifted) return;
  lifted = true;
  clearTimeout(autoLift); clearTimeout(anticTimer); clearTimeout(rattleTimer);
  cloche.classList.remove('rattle');
  revealBeepo.classList.remove('lean');
  rBubble.classList.remove('show');
  hideHand();
  hint.classList.add('gone');
  sLift(); buzz(20);
  overlay.classList.add('revealing');
  cloche.classList.add('lift');
  /* H#8: reduced-motion collapses the cloche transition — don't stall on the full 2.1s */
  setTimeout(finishReveal, matchMedia('(prefers-reduced-motion: reduce)').matches ? 350 : 2100);
}
cloche.addEventListener('pointerdown', liftCover);

function finishReveal(){
  const {verdict, tier, name} = pendingResult || {verdict:'yummy', tier:'ok', name:''};
  overlay.classList.add('revealed');
  /* B#16: discovery = the moment the dish is SEEN; schedule the wordless NEW! stamp */
  const disc = (pendingResult && pendingResult.key) ? recordDiscovery(pendingResult.key) : {isNew:false};
  if(disc.isNew){
    const slamAt = tier==='refuse' ? 3500 : 900;
    schedule(slamStamp, slamAt);
    schedule(flyStampToBook, slamAt+2600);
  }
  /* dish-specific one-liner (B#9) */
  const dl = DISH_LINES.find(d=>name && name.includes(d[0]));
  if(dl) sayR(dl[1]);
  if(verdict==='yucky'){
    setExp(revealBeepo,'yuck');
    sPeeyew();
    [24,80,136,192,248].forEach((x,i)=>{
      const s=document.createElement('div');
      s.className='stinkLine';
      s.innerHTML='<svg width="30" height="42" viewBox="-9 -33 22 38"><use href="#g-stink"/></svg>';
      s.style.left=x+'px'; s.style.top='20px'; s.style.animationDelay=(i*.6)+'s';
      plateWrap.appendChild(s);
    });
    schedule(()=>refuseDish(), 1700);
    return;
  }
  duckMusic(1600);   /* let the reveal stingers punch through the music */
  if(verdict==='magical'){
    setExp(revealBeepo,'wow');
    sSparkle(); sGliss(); setTimeout(sTada,500);
    confettiBurst(40); buzz([30,50,30]);
    overlay.classList.remove('shake'); void overlay.offsetWidth;
    overlay.classList.add('shake');
  } else {
    setExp(revealBeepo,'yum');
    sTada();
    confettiBurst(20); buzz(25);
  }
  schedule(()=>beginFeeding(tier), 1300);
}

/* ================= tap-to-feed (B#1) ================= */
const rBubble = $('rBubble');
let eatTimers = [], feeding=false, bitesDone=0, idleFeedTimer;
function schedule(fn, ms){ eatTimers.push(setTimeout(fn, ms)); }
function clearEating(){ eatTimers.forEach(clearTimeout); eatTimers=[]; clearTimeout(idleFeedTimer); }
/* H#2: auto-restart is idle-based — any overlay tap re-arms it so it never yanks the screen mid-tap */
function armRestart(ms){ restartArmed=true; clearTimeout(restartTimer);
  restartTimer=setTimeout(()=>{ restartArmed=false; if(overlay.classList.contains('show')) $('againBtn').click(); }, ms); }
function sayR(txt){ rBubble.textContent=txt; rBubble.classList.add('show'); }

/* gross-out comedy (B#6): refuse → dramatic faint → giggly recovery.
   Zero fail — it's the best silly outcome. */
function refuseDish(){
  sayR('NO WAY!!');
  setExp(revealBeepo,'refuse');
  const wc=dishIngs.querySelector('.chip[data-id="worm"]'); if(wc) wc.classList.add('wiggle');  /* B#15 */
  sNuhuh(); buzz([40,60,40]);
  plateWrap.classList.add('pushed');
  spawnFlies(3);
  schedule(sNuhuh, 900);
  schedule(()=>{                                   /* dramatic faint */
    revealBeepo.classList.add('faint');
    sayR('Bleh…!');
    beep(a=>tone(a,'triangle',900,180,0,.7,.12));  /* slide-whistle down */
  }, 2000);
  schedule(()=>{ duckMusic(1800); sWahWah(); }, 2750);  /* sad trombone lands the gag */
  schedule(()=>{                                   /* pop back up, all giggles */
    revealBeepo.classList.remove('faint');
    setExp(revealBeepo,'yum');                     /* joyBounce ×3 */
    sBoing();
    sayR('Hihi! Again?');
    $('againBtn').classList.add('shown');   /* only after the whole gag */
  }, 3500);
  armRestart(8200);   /* H#2: idle-based restart for the refuse gag too */
}
function spawnFlies(n){
  for(let i=0;i<n;i++){
    const f=document.createElement('div');
    f.className='fly'; f.innerHTML=iconSVG('ui-fly',26);
    f.style.left=(112+i*14)+'px';
    f.style.top=(92+i*16)+'px';
    f.style.animationDelay=(i*-0.7)+'s';
    f.style.animationDuration=(2+i*0.4)+'s';

function beginFeeding(tier){
  feeding=true; bitesDone=0;
  overlay.classList.add('eating');
  revealBeepo.classList.add('feeding');
  if(tier==='vor') revealBeepo.classList.add('fast');
  sayR(tier==='vor' ? pick(VOR_START) : pick(EAT_START));
  armAutoBite(900);
}
/* eating runs by itself on a tasty rhythm; taps just add bonus bites */
function armAutoBite(ms){
  clearTimeout(idleFeedTimer);
  idleFeedTimer=setTimeout(bite, ms);
}
function bite(){                          /* auto-rhythm bite: this is what advances the meal */
  if(!feeding) return;
  bitesDone++;
  /* chomp pitch steps up each bite — the meal is a tiny melody that finishes */
  beep(a=>{ const b=170*Math.pow(1.16,bitesDone);
    tone(a,'square',b,b*.45,0,.09,.11); tone(a,'triangle',b*2.4,b,.01,.07,.07); });
  buzz(10);
  revealBeepo.classList.remove('bite'); void revealBeepo.offsetWidth;
  revealBeepo.classList.add('bite');
  const food=dishBig.querySelector('.lyr-food');    /* B#14: only the FOOD depletes; vessel stays */
  if(food) food.style.transform=`scale(${Math.max(1-bitesDone*0.19,0.05)}) rotate(${bitesDone%2?-4:4}deg)`;
  /* juice #6: the dish giggle-jiggles at each bite */
  dishBig.classList.remove('chomped'); void dishBig.offsetWidth; dishBig.classList.add('chomped');
  /* juice #7: Beepo's belly grows a step per bite (reset on cook-again) */
  const belly=revealBeepo.querySelector('.torso');
  if(belly) belly.style.transform=`scale(${1+bitesDone*0.055},${1+bitesDone*0.035})`;
  if(bitesDone%2===1) chunkFly();          /* discrete chunk flies to his mouth (bites 1,3,5) */
  crumbs(revealBeepo.classList.contains('fast')?4:2);
  if(bitesDone>=BITES) finishFeeding();
  else armAutoBite(revealBeepo.classList.contains('fast') ? 480 : 1050);
}
/* H#3: a tap adds spectacle but NEVER shortens the meal (no bitesDone increment) */
function bonusChomp(){
  if(!feeding) return;
  sChomp(); buzz(8);
  revealBeepo.classList.remove('bite'); void revealBeepo.offsetWidth;
  revealBeepo.classList.add('bite');
  const food=dishBig.querySelector('.lyr-food');
  if(food){ food.classList.remove('wobble'); void food.offsetWidth; food.classList.add('wobble'); }
  crumbs(2);
}
/* B#14: on odd bites, a real ingredient icon flies out of the food layer to Beepo's
   mouth — depletion reads as discrete, countable events (this IS B#12, art-free). */
function chunkFly(){
  const food=dishBig.querySelector('.lyr-food');
  const chunk=food && food.querySelector('.food-chunk');
  if(!chunk) return;
  const id=chunk.dataset.id, from=chunk.getBoundingClientRect();
  chunk.remove();
  if(!from.width) return;
  const mouth=revealBeepo.getBoundingClientRect();
  const fl=document.createElement('div');
  fl.className='flyer'; fl.innerHTML=ingImg(id,40);
  fl.style.left=(from.left+from.width/2-20)+'px'; fl.style.top=(from.top+from.height/2-20)+'px';
  document.body.appendChild(fl);
  const dx=(mouth.left+mouth.width*0.6)-(from.left+from.width/2);
  const dy=(mouth.top+mouth.height*0.5)-(from.top+from.height/2);
  fl.animate([
    {transform:'translate(0,0) scale(1)', opacity:1},
    {transform:`translate(${dx*.5}px,${dy*.5-18}px) scale(.8) rotate(120deg)`, opacity:1, offset:.6},
    {transform:`translate(${dx}px,${dy}px) scale(.2) rotate(210deg)`, opacity:0}
  ],{duration:380, easing:'cubic-bezier(.4,.4,.6,1)'}).onfinish=()=>{ fl.remove(); buzz(8); };  /* haptic on mouth contact */
}
function finishFeeding(){
  feeding=false;
  clearTimeout(idleFeedTimer);
  const food=dishBig.querySelector('.lyr-food');   /* B#14: zero ONLY the food; the vessel stays */
  if(food){ food.style.transform='scale(0)'; food.style.opacity='0'; }
  if(!dishBig.classList.contains('eat-whole')){
    const vessel=dishBig.querySelector('.lyr-vessel');
    if(vessel) vessel.classList.add('clean');      /* licked-clean shine — the "all gone!" beat */
  }
  sGulp(); buzz([10,20,35]);
  schedule(sAhh, 380);                       /* satisfied sigh after the swallow */
  schedule(()=>{
    const fast = revealBeepo.classList.contains('fast');
    revealBeepo.classList.remove('feeding','fast','bite');
    setExp(revealBeepo,'yum');
    sayR(fast ? pick(VOR_END) : pick(EAT_END));
    if(fast){ sBurp(); confettiBurst(12); } else sDing();
    $('againBtn').classList.add('shown');   /* only after the reaction */
  }, 600);
  armRestart(5200);   /* H#2: idle-based auto-restart; the arrow button just skips the wait */
}

/* ================= helpers ================= */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function blendColors(hexes){
  let r=0,g=0,b=0;
  hexes.forEach(h=>{ const n=parseInt(h.slice(1),16); r+=n>>16; g+=(n>>8)&255; b+=n&255; });
  const L=hexes.length;
  return `rgb(${Math.round(r/L)},${Math.round(g/L)},${Math.round(b/L)})`;
}
function confettiBurst(n){
  const colors=['#FF6B6B','#FFD93C','#6BCB77','#4D96FF','#E96BC0','#FF9F45'];
  const star='polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)';
  for(let i=0;i<n;i++){
    const c=document.createElement('div');
    c.className='confetti';
    const size=9+Math.random()*8;
    c.style.width=size+'px'; c.style.height=size+'px';
    c.style.left=Math.random()*100+'vw';
    if(Math.random()<.3){                    /* juice #8: some confetti is tiny raining food */
      c.innerHTML=`<img src="assets/ing/${pick(INGREDIENTS).id}.webp" width="19" height="19" alt="" draggable="false">`;
    } else {
      c.style.background=pick(colors);
      const shape=Math.random();
      if(shape<.33) c.style.clipPath=star;
      else c.style.borderRadius = shape<.66 ? '50%' : '3px';
    }
    c.style.setProperty('--dx', (Math.random()*160-80)+'px');
    c.style.animationDuration=(2.2+Math.random()*1.8)+'s';
    c.style.animationDelay=(Math.random()*.6)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }
}

/* ================= B#16: recipe book (a scrapbook, never a checklist) =================
   No counters, no locked grid, no completion reward — only what's been discovered,
   newest first, plus <=3 gentle "quest teaser" cards. Keys are the sorted combo keys
   findDish already uses (stable across the art reskin). */
const BK_KEY='bk-dishes';
function bkLoad(){ try{ const o=JSON.parse(localStorage.getItem(BK_KEY)); if(o&&o.d) return o; }catch(e){} return {v:1,d:{}}; }
function bkSave(o){ try{ localStorage.setItem(BK_KEY, JSON.stringify(o)); }catch(e){} }
let bkData=bkLoad();
const bookBtn=$('bookBtn'), bookOverlay=$('bookOverlay'), bookScroll=$('bookScroll');
if(Object.keys(bkData.d).length) bookBtn.classList.add('has');

/* discovery = the dish is SEEN (called from finishReveal). Yucky dishes count. */
function recordDiscovery(key){
  const isNew=!bkData.d[key];
  const e=bkData.d[key] || {t:Date.now(), c:0};
  e.c++; if(isNew) e.t=Date.now();
  bkData.d[key]=e; bkSave(bkData);
  bookBtn.classList.add('has');
  return {isNew};
}

/* <=3 undiscovered combos sharing >=1 ingredient with the last cook (prefer 2-ingredient) */
function bkTeasers(lastIds){
  const out=[];
  for(const key in DISH_CATALOG){
    if(bkData.d[key]) continue;
    const ids=key.split('+');
    if(ids.length>2) continue;
    if(lastIds && !ids.some(id=>lastIds.includes(id))) continue;
    out.push(key); if(out.length>=3) break;
  }
  return out;
}

function bkCard(key, discovered){
  const ids=key.split('+'), dish=findDish(ids), L=dish.layers;
  if(!discovered){
    let c='';
    ids.forEach((id,k)=>{ if(k) c+='<span class="bk-op"><svg class="icon" viewBox="0 0 100 100" width="15" height="15"><use href="#ui-plus"/></svg></span>';
      c+=`<span class="bk-chip">${ingImg(id,30)}</span>`; });
    c+='<span class="bk-op"><svg class="icon" viewBox="0 0 100 100" width="17" height="17"><use href="#ui-equals"/></svg></span>'
     +'<span class="bk-q"><svg viewBox="0 0 100 100" width="40" height="40"><use href="#top-question"/></svg></span>';
    return `<div class="bk-card teaser">${c}</div>`;
  }
  const date=new Date(bkData.d[key].t).toLocaleDateString();
  const dishHTML = dish.art ? `<img class="bk-dishimg" src="assets/dish/${dish.art}" alt="" draggable="false">`
                            : `<svg viewBox="0 0 100 100">${L.vessel}${L.food}${L.fx}</svg>`;
  return `<div class="bk-card ${dish.verdict}"><div class="bk-dish">${dishHTML}</div>`
       +`<div class="bk-strip">${recipeStripHTML(ids,L,dish.verdict,dish.art)}</div>`
       +`<div class="bk-name">${dish.name}</div><div class="bk-date">${date}</div></div>`;
}

function renderBook(){
  const keys=Object.keys(bkData.d).sort((a,b)=>bkData.d[b].t-bkData.d[a].t);   /* newest first */
  const teasers=bkTeasers(keys[0]?keys[0].split('+'):null);
  bookScroll.innerHTML = keys.map(k=>bkCard(k,true)).join('') + teasers.map(k=>bkCard(k,false)).join('');
}

let bookIdleTimer;
function armBookIdle(){ clearTimeout(bookIdleTimer); bookIdleTimer=setTimeout(closeBook, 30000); }   /* never-stall */
function openBook(){
  if(overlay.classList.contains('show')) return;   /* only from the kitchen — cook loop stays unbreakable */
  renderBook(); bookOverlay.classList.add('show'); bookBtn.classList.remove('badge');
  sPage(); armBookIdle();
}
function closeBook(){ bookOverlay.classList.remove('show'); clearTimeout(bookIdleTimer); }
bookBtn.addEventListener('click', openBook);
$('bookClose').addEventListener('click', closeBook);
bookOverlay.addEventListener('pointerdown', e=>{ armBookIdle(); if(e.target===bookOverlay) closeBook(); });
bookScroll.addEventListener('pointerdown', e=>{                 /* card tap = replay of joy */
  const card=e.target.closest('.bk-card'); if(!card || card.classList.contains('teaser')) return;
  card.classList.remove('cardpop'); void card.offsetWidth; card.classList.add('cardpop'); sPop();
});

/* NEW! stamp — wordless first-discovery reward that flies to the book to teach where it lives */
function slamStamp(){
  if($('newStamp')) return;
  const st=document.createElement('div'); st.id='newStamp';
  st.innerHTML='<svg viewBox="0 0 100 100" width="86" height="86"><use href="#ui-stamp-new"/></svg>';
  plateWrap.appendChild(st);
  st.animate([{transform:'scale(1.7) rotate(-18deg)',opacity:0},
    {transform:'scale(.88) rotate(-9deg)',opacity:1,offset:.6},
    {transform:'scale(1) rotate(-9deg)',opacity:1}],{duration:420,easing:'cubic-bezier(.3,1.5,.4,1)',fill:'forwards'});
  duckMusic(1200);
  beep(a=>{ tone(a,'sine',170,110,0,.16,.16); tone(a,'sine',1046,1046,.11,.3,.11); });   /* thunk + chime (NOT sTada) */
  buzz([25,40]);
}
function flyStampToBook(){
  const st=$('newStamp'); if(!st) return;
  const from=st.getBoundingClientRect(), to=bookBtn.getBoundingClientRect();
  if(!to.width){ st.remove(); return; }
  const dx=(to.left+to.width/2)-(from.left+from.width/2), dy=(to.top+to.height/2)-(from.top+from.height/2);
  st.animate([{transform:'translate(0,0) scale(1)',opacity:1},
    {transform:`translate(${dx}px,${dy}px) scale(.22)`,opacity:.5}],{duration:600,easing:'cubic-bezier(.5,.1,.4,1)'})
    .onfinish=()=>{ st.remove(); bookBtn.classList.add('badge','boing'); setTimeout(()=>bookBtn.classList.remove('boing'),500); };
}
</script>
</body>
